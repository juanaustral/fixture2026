<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundial 2026 — Resultados y Clasificación</title>
<style>
  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --border: #2a2a4a;
    --text: #e0e0f0;
    --muted: #8888aa;
    --accent: #00d4aa;
    --green: #00c853;
    --yellow: #ffd600;
    --orange: #ff9100;
    --red: #ff1744;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 12px;
  }
  h1 {
    text-align: center;
    font-size: 1.6rem;
    margin-bottom: 2px;
    color: #fff;
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    margin-bottom: 16px;
  }
  .last-update {
    text-align: center;
    color: var(--accent);
    font-size: 0.7rem;
    margin-bottom: 12px;
  }
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-bottom: 16px;
    font-size: 0.75rem;
  }
  .legend span { display: inline-flex; align-items: center; gap: 4px; }
  .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; }
  .dot.green { background: var(--green); }
  .dot.yellow { background: var(--yellow); }
  .dot.orange { background: var(--orange); }
  .dot.red { background: var(--red); }

  .groups-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .group-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
  }
  .group-card h2 {
    font-size: 0.9rem;
    color: var(--accent);
    margin-bottom: 8px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.75rem;
  }
  th {
    text-align: left;
    color: var(--muted);
    font-weight: 500;
    padding: 3px 2px;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  th.pts { text-align: center; width: 24px; }
  th.dg { text-align: center; width: 24px; }
  th.st { text-align: center; width: 30px; }
  td { padding: 4px 2px; border-top: 1px solid rgba(255,255,255,0.04); }
  td.team { font-weight: 500; white-space: nowrap; }
  td.pts { text-align: center; font-weight: 700; font-size: 0.85rem; }
  td.dg { text-align: center; }
  td.st { text-align: center; font-size: 0.85rem; }
  .flag { font-size: 1rem; margin-right: 3px; }
  .summary {
    margin-top: 5px;
    font-size: 0.65rem;
    color: var(--muted);
    line-height: 1.4;
    padding-top: 4px;
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  .tag {
    display: inline-block;
    font-size: 0.55rem;
    padding: 1px 5px;
    border-radius: 5px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }
  .tag-green { background: rgba(0,200,83,0.15); color: var(--green); }
  .tag-yellow { background: rgba(255,214,0,0.15); color: var(--yellow); }
  .tag-orange { background: rgba(255,145,0,0.15); color: var(--orange); }
  .tag-red { background: rgba(255,23,68,0.15); color: var(--red); }
  .pending {
    margin-top: 4px;
    font-size: 0.65rem;
    color: var(--yellow);
    line-height: 1.3;
    padding-top: 4px;
    border-top: 1px solid rgba(255,255,255,0.04);
  }
  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    padding-top: 6px;
    border-top: 1px solid var(--border);
  }
  .btn-reload {
    background: var(--accent);
    color: #0f0f1a;
    border: none;
    padding: 4px 12px;
    border-radius: 5px;
    font-size: 0.65rem;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-reload:hover { opacity: 0.8; }
  .source {
    font-size: 0.6rem;
    color: var(--muted);
  }
  .footer {
    text-align: center;
    margin-top: 24px;
    font-size: 0.65rem;
    color: var(--muted);
  }
  @media (max-width: 480px) {
    .groups-grid { grid-template-columns: 1fr; }
    body { padding: 8px; }
  }
</style>
</head>

  groups.forEach(g => {

    let h = `<h2>${g.name}</h2>`;
    h += '<table><thead><tr><th>Equipo</th><th class="pts">Pts</th><th class="dg">DG</th><th class="st"></th></tr></thead><tbody>';

      h += `<tr><td class="team"><span class="flag">${t.flag}</span>${t.name}</td>`;

    });
    h += '</tbody></table>';
    if (g.pend && g.pend !== "—") {
      h += `<div class="pending">⏳ ${g.pend}</div>`;
    }
    h += `<div class="card-footer">`;
    h += `<span class="source">Yahoo Sports · TUDN</span>`;
    h += `<button class="btn-reload" onclick="location.reload()">↻ Recargar</button>`;
    h += `</div>`;
    card.innerHTML = h;
    c.appendChild(card);
  });
