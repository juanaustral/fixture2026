<html lang="es">
<head>

<title>Fixture 2026 — Mundial</title>
<style>
  /* ═══════════ PALETA MUNDIAL 2026 ═══════════ */
  :root {
    --bg: #0b0e17;
    --card: #111622;
    --border: #1e2640;
    --text: #e8ecf2;
    --muted: #6b7d99;
    --accent: #e13a3e;
    --gold: #f6a821;
    --teal: #00b4b8;
    --green: #10b981;
    --red: #ef4444;
    --orange: #f97316;
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ═══════════ FONDO TEXTURA PELOTA ═══════════ */
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    background:
      /* pentágonos sutiles estilo pelota */
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.015) 0%, transparent 50%),
      radial-gradient(circle at 75% 60%, rgba(255,255,255,0.012) 0%, transparent 45%),
      radial-gradient(circle at 45% 80%, rgba(255,255,255,0.018) 0%, transparent 55%),
      radial-gradient(circle at 85% 15%, rgba(255,255,255,0.01) 0%, transparent 40%),
      radial-gradient(ellipse at 50% 50%, rgba(230,58,62,0.03) 0%, transparent 70%),
      var(--bg);
    color: var(--text);
    line-height: 1.4;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      radial-gradient(circle at 15% 20%, rgba(255,255,255,0.02) 1px, transparent 1px),
      radial-gradient(circle at 85% 75%, rgba(255,255,255,0.015) 1.5px, transparent 1.5px),
      radial-gradient(circle at 50% 50%, rgba(246,168,33,0.03) 2px, transparent 2px),
      radial-gradient(circle at 30% 65%, rgba(0,180,184,0.025) 1px, transparent 1px),
      radial-gradient(circle at 70% 35%, rgba(255,255,255,0.01) 2px, transparent 2px);
    background-size: 200px 200px, 280px 280px, 350px 350px, 220px 220px, 300px 300px;
    pointer-events: none; z-index: 0;
  }

  .page { position: relative; z-index: 1; padding: 20px; }

  /* ═══════════ HEADER ═══════════ */
  .header {
    text-align: center;
    margin-bottom: 28px;
    position: relative;
  }
  .header h1 {
    font-size: 2.6rem;
    font-weight: 800;
    letter-spacing: -1.5px;
    color: #fff;
    margin-bottom: 2px;
  }
  .header h1 span { color: var(--accent); }
  .header .author {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .header .author a { color: var(--teal); text-decoration: none; }
  .header .update-info {
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .update-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
  }
  .btn-refresh {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 36px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 30px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    letter-spacing: -0.2px;
    box-shadow: 0 4px 20px rgba(225,58,62,0.25);
  }
  .btn-refresh:hover {
    filter: brightness(1.1);
    transform: scale(1.04);
    box-shadow: 0 6px 28px rgba(225,58,62,0.35);
  }
  .btn-refresh:active { transform: scale(0.97); }

  /* ═══════════ PARTIDOS DE HOY ═══════════ */
  .today-matches {
    max-width: 900px;
    margin: 0 auto 28px auto;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 22px;
  }
  .today-matches h3 {
    font-size: 0.85rem;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .today-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 10px;
  }
  .today-match {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.02);
    border-radius: 10px;
    border: 1px solid var(--border);
    font-size: 0.78rem;
  }
  .today-match .group-tag {
    font-size: 0.6rem;
    background: var(--accent);
    color: #fff;
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 700;
    text-transform: uppercase;
  }
  .today-match .score {
    font-weight: 700;
    font-size: 0.85rem;
    color: #fff;
    margin: 0 4px;
    min-width: 28px;
    text-align: center;
  }
  .today-match .pending-tag {
    font-size: 0.6rem;
    color: var(--gold);
    white-space: nowrap;
  }
  .today-match .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--red);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ═══════════ LEGEND ═══════════ */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-bottom: 28px;
    font-size: 0.78rem;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--card);
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }
  .legend-dot {
    width: 9px; height: 9px;
    border-radius: 3px;
  }

  /* ═══════════ GROUPS GRID ═══════════ */
  .groups-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 16px;
    max-width: 1580px;
    margin: 0 auto;
  }

  /* ═══════════ GROUP CARD ═══════════ */
  .group-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    position: relative;
    overflow: hidden;
  }
  .group-card::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(225,58,62,0.04) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }
  .group-card h2 {
    font-size: 1.05rem;
    color: var(--teal);
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    position: relative;
    z-index: 1;
  }
  .group-card h2 .badge {
    font-size: 0.65rem;
    color: var(--muted);
    font-weight: 400;
    margin-left: auto;
    background: rgba(255,255,255,0.03);
    padding: 2px 8px;
    border-radius: 8px;
  }

  /* ═══════════ STANDINGS TABLE ═══════════ */
  .standings-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
  }
  .standings-table th {
    text-align: left;
    color: var(--muted);
    font-weight: 500;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    padding: 8px 6px;
    border-bottom: 1px solid var(--border);
  }
  .standings-table th.center { text-align: center; }
  .standings-table th.num { text-align: center; width: 32px; }
  .standings-table td {
    padding: 8px 6px;
    border-bottom: 1px solid rgba(255,255,255,0.025);
    vertical-align: middle;
  }
  .standings-table td.team-cell {
    display: flex;
    align-items: center;
    gap: 7px;
    font-weight: 600;
  }
  .standings-table td.team-cell .flag { font-size: 1.15rem; }
  .standings-table td.num { text-align: center; font-weight: 700; font-size: 0.9rem; }
  .standings-table td.status-text {
    font-size: 0.65rem;
    font-weight: 600;
    white-space: nowrap;
    padding: 3px 8px;
    border-radius: 4px;
    text-align: center;
    letter-spacing: 0.3px;
  }
  .status-clasificado { background: rgba(16,185,129,0.12); color: var(--green); }
  .status-comodo { background: rgba(0,180,184,0.12); color: var(--teal); }
  .status-complicado { background: rgba(249,115,22,0.12); color: var(--orange); }
  .status-eliminado { background: rgba(239,68,68,0.12); color: var(--red); }

  /* ═══════════ TEAM DETAIL ROW ═══════════ */
  .team-detail {
    font-size: 0.7rem;
    color: var(--muted);
    padding: 6px 0 4px 6px;
  }
  .team-detail .label { color: var(--muted); font-size: 0.63rem; text-transform: uppercase; }
  .team-detail .win { color: var(--green); }
  .team-detail .draw { color: var(--gold); }
  .team-detail .loss { color: var(--red); }
  .team-detail .pending { color: var(--teal); }
  .team-detail .requirement {
    color: var(--gold);
    font-weight: 500;
    margin-top: 3px;
  }

  /* ═══════════ GROUP REQUIREMENTS BOX ═══════════ */
  .group-reqs {
    margin-top: 14px;
    padding: 12px 14px;
    background: rgba(255,255,255,0.015);
    border-radius: 10px;
    border-left: 3px solid var(--accent);
    font-size: 0.72rem;
    color: var(--muted);
    line-height: 1.55;
  }
  .group-reqs strong { color: var(--text); }
  .group-reqs .req-item { padding: 2px 0; }
  .group-reqs .req-clasif { color: var(--green); }
  .group-reqs .req-comodo { color: var(--teal); }
  .group-reqs .req-complicado { color: var(--orange); }
  .group-reqs .req-elim { color: var(--red); }

  /* ═══════════ FOOTER ═══════════ */
  .footer {
    text-align: center;
    margin-top: 36px;
    padding: 16px;
    font-size: 0.68rem;
    color: var(--muted);
  }
  .footer a { color: var(--teal); text-decoration: none; }

  /* ═══════════ RESPONSIVE ═══════════ */
  @media (max-width: 520px) {
    .groups-grid { grid-template-columns: 1fr; }
    .header h1 { font-size: 2rem; }
    .page { padding: 10px; }
    .today-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

// ═══════════ RENDER ═══════════
function renderToday() {
  const grid = document.getElementById('todayGrid');
  grid.innerHTML = todayMatches.map(m => {
    const statusHtml = m.score
      ? '<span class="score">' + m.score + '</span>'
      : '<span class="pending-tag">' + m.time + ' ARG</span>';
    return '<div class="today-match">' +
      '<span class="group-tag">G' + m.group + '</span>' +
      '<div style="flex:1">' +
      '<div>' + m.home + ' vs ' + m.away + ' ' + statusHtml + '</div>' +
      '<div style="font-size:0.65rem;color:var(--muted);margin-top:4px;line-height:1.35">' + m.comment + '</div>' +
      '</div>' +
      '</div>';
  }).join('');
}

function render() {
  const container = document.getElementById('app');
  groups.forEach(g => {
    const card = document.createElement('div');
    card.className = 'group-card';

    let html = '<h2>' + g.name + '<span class="badge">Jornada ' +
      (g.teams[0].played.length) + '/3</span></h2>';

    // Standings table
    html += '<table class="standings-table"><thead><tr>';
    html += '<th>Equipo</th><th class="num">PTS</th><th class="num">PP</th><th>Estado</th>';
    html += '</tr></thead><tbody>';
    g.teams.forEach(t => {
      // Team row
      html += '<tr>';
      html += '<td class="team-cell"><span class="flag">' + t.flag + '</span>' + t.name + '</td>';
      html += '<td class="num">' + t.pts + '</td>';
      html += '<td class="num">' + t.pp + '</td>';
      html += '<td><span class="status-text status-' + t.sClass + '">' + t.status + '</span></td>';
      html += '</tr>';

      // Detail row
      html += '<tr><td colspan="4"><div class="team-detail">';
      // Played matches
      html += '<span class="label">Jugados:</span> ';
      t.played.forEach((m,i) => {
        if (i>0) html += ' · ';
        const cls = m.r==='w'?'win':m.r==='d'?'draw':'loss';
        html += '<span class="'+cls+'">' + m.t + ' ' + m.s + '</span>';
      });
      // Pending
      if (t.pending.length > 0) {
        html += ' &nbsp;|&nbsp; <span class="label">Pendiente:</span> ';
        t.pending.forEach((p,i) => {
          if (i>0) html += ' · ';
          html += '<span class="pending">vs ' + p.v + ' (' + p.d + ')</span>';
        });
      }
      // Requirement (only if not already classified with nothing to play for)
      if (t.req) {
        html += '<div class="requirement">→ ' + t.req + '</div>';
      }
      html += '</div></td></tr>';
    });
    html += '</tbody></table>';

    // Group requirements box
    html += '<div class="group-reqs">';
    html += '<strong>Estado del grupo:</strong><br>';
    g.reqs.forEach(r => { html += '<div class="req-item">' + r + '</div>'; });
    html += '</div>';

    card.innerHTML = html;
    container.appendChild(card);
  });

  // Update timestamp
  const now = new Date();
  document.getElementById('lastUpdate').textContent =
    now.toLocaleDateString('es-AR', {day:'2-digit',month:'short',year:'numeric'}) + ' ' +
    now.toLocaleTimeString('es-AR', {hour:'2-digit',minute:'2-digit',second:'2-digit'}) + ' ARG';
}

renderToday();
render();
