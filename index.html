<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixture 2026 έΑΦ Fase Eliminatoria</title>
<style>
:root{--green:#3CAC3B;--blue:#2A398D;--red:#E61D25;--lgray:#D1D4D1;--dgray:#474A4A;--bg:#eff0ed;--card:#fff;--border:#dde0dc;--text:#2a2d2d;--muted:#6b706e;--radius:8px;--shadow:0 1px 4px rgba(0,0,0,.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.4;overflow:hidden;height:100vh;display:flex;flex-direction:column}

/* έΦΑέΦΑ HEADER (compact) έΦΑέΦΑ */
.header{display:flex;align-items:center;justify-content:center;gap:12px;padding:8px 14px;flex-shrink:0;border-bottom:1px solid var(--border);background:var(--bg);position:relative;z-index:10}
.header h1{font-size:1.1rem;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,var(--red),var(--blue),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
.header .author{font-size:.58rem;color:var(--muted);display:flex;gap:4px;align-items:center}
.header .author a{color:var(--blue);text-decoration:none;font-weight:600}
.header .update-info{font-size:.55rem;color:var(--text);display:flex;gap:4px;align-items:center;white-space:nowrap}
.header .update-info .countdown{color:var(--blue);font-weight:600}
.header .visor-link{font-size:.55rem;color:var(--green);text-decoration:none;font-weight:600;padding:2px 8px;border:1px solid rgba(60,172,59,.3);border-radius:12px;white-space:nowrap}
.header .version-link{font-size:.5rem;color:var(--muted);text-decoration:none;border-bottom:1px dotted var(--muted);white-space:nowrap}

@media(max-width:600px){
  .header{flex-wrap:wrap;gap:4px;padding:5px 8px}
  .header h1{font-size:.9rem}
  .header .author,.header .visor-link{display:none}
}

/* έΦΑέΦΑ BRACKET έΦΑέΦΑ */
.bracket-wrap{flex:1;display:flex;overflow:hidden;position:relative;padding:4px 6px 4px 4px}
.bracket{display:flex;gap:0;width:100%;height:100%;position:relative}
.round{display:flex;flex-direction:column;flex:1;min-width:0;position:relative;padding:0 2px}
.round:first-child{padding-left:0}
.round:last-child{padding-right:0}

/* έΦΑέΦΑ SVG lines layer έΦΑέΦΑ */
#linesSvg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1}

/* έΦΑέΦΑ MATCH NODE έΦΑέΦΑ */
.match-wrap{position:absolute;left:0;right:0;z-index:2;padding:0 2px}
.match{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:3px 5px;cursor:pointer;transition:all .15s;height:100%;
  display:flex;flex-direction:column;justify-content:center;
}
.match:hover{z-index:5;border-color:var(--blue);box-shadow:0 2px 10px rgba(42,57,141,.15);transform:scale(1.02)}
.match.played{background:linear-gradient(135deg,rgba(60,172,59,.03),var(--card))}
.match.live{border-color:var(--red);animation:lp 2s infinite}
@keyframes lp{0%,100%{box-shadow:0 0 0 0 rgba(230,29,37,.15)}50%{box-shadow:0 0 0 4px rgba(230,29,37,0)}}
.match .team{display:flex;align-items:center;gap:3px}
.match .team .flag{font-size:.7em;flex-shrink:0;line-height:1}
.match .team .name{font-size:.6rem;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.match .team .score{font-size:.6rem;font-weight:800;color:var(--blue);text-align:right;flex-shrink:0;min-width:16px}
.match .team.winner .name,.match .team.winner .score{color:var(--green)}
.match .m-extra{font-size:.45rem;color:var(--muted);font-style:italic;text-align:right;margin-top:1px;line-height:1}
.round-title{font-size:.55rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#fff;text-align:center;padding:3px 4px;background:var(--blue);border-radius:var(--radius);margin-bottom:0;flex-shrink:0;position:relative;z-index:2}
.round:last-child .round-title{background:linear-gradient(135deg,#c9a84c,#f5d76e,#c9a84c);color:var(--dgray)}

/* έΦΑέΦΑ MODAL έΦΑέΦΑ */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;padding:12px}
#modal .box{background:var(--card);border-radius:12px;padding:18px;max-width:380px;width:100%;max-height:80vh;overflow-y:auto;position:relative}
#modal .close{position:absolute;top:6px;right:8px;background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--muted)}
#modal .tf{font-size:2rem;text-align:center}
#modal .tn{font-size:1rem;font-weight:800;text-align:center}
#modal .ts{font-size:.6rem;text-align:center;color:var(--muted);margin-bottom:8px}
#modal .gr{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:8px}
#modal .st{background:#f6f7f5;border-radius:8px;padding:6px 8px;text-align:center}
#modal .st .v{font-size:.9rem;font-weight:800;color:var(--blue)}
#modal .st .l{font-size:.48rem;color:var(--muted);text-transform:uppercase}
#modal .bar{margin:6px 0}
#modal .bar-l{display:flex;justify-content:space-between;font-size:.5rem;color:var(--muted)}
#modal .bar-f{height:5px;border-radius:3px;background:var(--border);overflow:hidden}
#modal .bar-fill{height:100%;border-radius:3px}
#modal .sec h4{font-size:.6rem;color:var(--blue);margin-bottom:3px;text-transform:uppercase}
#modal .sec .row{display:flex;align-items:center;gap:4px;font-size:.58rem;padding:2px 0;border-bottom:1px solid rgba(0,0,0,.03)}

/* έΦΑέΦΑ CHANGELOG έΦΑέΦΑ */
#chlog{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;align-items:center;justify-content:center;padding:12px}
#chlog .box{background:var(--card);border-radius:12px;padding:18px;max-width:400px;width:100%;max-height:70vh;overflow-y:auto}
#chlog .entry{margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid var(--border);font-size:.62rem}

@media(max-width:768px){
  body{overflow:auto;height:auto}
  .bracket-wrap{overflow-x:auto;padding:4px}
  .round{min-width:160px}
}
</style>
</head>
<body>

<div class="header">
  <span class="author"><span>Desarrollado por</span><a href="https://juanmartinezgarcia.com">Juan Martinez Garcia</a></span>
  <h1>Fixture 2026</h1>
  <span class="update-info">Prox: <strong id="nextUpdate">-</strong> <span class="countdown" id="countdown"></span></span>
  <a href="https://juanaustral.github.io/visormundial/" class="visor-link" target="_blank">Ver en vivo</a>
  <a href="#" onclick="toggleChangelog();return false" class="version-link" id="versionTag">--</a>
</div>

<div class="bracket-wrap">
  <div class="bracket" id="bracket">
    <svg id="linesSvg"></svg>
  </div>
</div>

<div id="modal" onclick="if(event.target===this)closeModal()">
  <div class="box"><button class="close" onclick="closeModal()">&#10005;</button><div id="modalBody"></div></div>
</div>

<div id="chlog" onclick="if(event.target===this)document.getElementById('chlog').style.display='none'">
  <div class="box">
    <h3 style="font-size:.75rem;color:var(--blue);margin-bottom:8px">Historial de versiones</h3>
    <div id="chlogBody"></div>
    <button onclick="document.getElementById('chlog').style.display='none'" style="margin-top:8px;background:var(--blue);color:#fff;border:none;padding:4px 14px;border-radius:6px;cursor:pointer;font-size:.6rem;font-weight:600">Cerrar</button>
  </div>
</div>

<script>
var API='https://raw.githubusercontent.com/juanaustral/fixture2026/main/data_ko.json';
var KO_DATA=null,TEAMS={},_modalData=null;
var VERSION_COUNT=29;
var CHANGELOG=[
  {v:29,date:'4 jul',text:'Rediseno: bracket horizontal compacto con lineas SVG de conexion entre rondas.'},
  {v:28,date:'4 jul',text:'Marruecos 3-0 Canada (completado). Marruecos avanza a cuartos.'},
  {v:27,date:'4 jul',text:'Octavos: Canada vs Marruecos y Paraguay vs Francia hoy 4 jul.'},
  {v:26,date:'3 jul',text:'Suiza 2-0 Argelia (16avos completado). Suiza avanza a octavos.'},
  {v:25,date:'2 jul',text:'EN VIVO: Espana vs Austria y Portugal vs Croacia.'},
  {v:24,date:'2 jul',text:'16avos: Espana vs Austria y Portugal vs Croacia hoy. Octavos con cruces.'},
  {v:23,date:'1 jul',text:'USA 2-0 Bosnia en 16avos. USA avanza a octavos vs Belgica.'},
  {v:22,date:'30 jun',text:'Francia 3-0 Suecia en 16avos.'},
];

function loadData(){
  fetch(API).then(function(r){return r.json()}).then(function(d){
    KO_DATA=d;TEAMS=d.teams||{};
    document.getElementById('versionTag').textContent=formatVersion(d.updated);
    renderBracket();
  }).catch(function(){
    try{KO_DATA=JSON.parse('{"updated":"?","teams":{},"rounds":[]}')}catch(e){}
    renderBracket();
  });
}

function cleanName(n){return n.replace(/ [\u{1F1E6}-\u{1F1FF}]{2}$/u,'').trim()}

function teamFlag(name){
  var c=cleanName(name),t=TEAMS[c];
  if(t&&t.flag)return t.flag;
  var m={'Sudafrica':'ΏθΘ┐ΏθΘο','Canada':'ΏθΘρΏθΘο','Brasil':'ΏθΘπΏθΘ╖','Japon':'ΏθΘψΏθΘ╡','Alemania':'ΏθΘσΏθΘς','Paraguay':'ΏθΘ╡ΏθΘ╛','Paises Bajos':'ΏθΘ│ΏθΘ▒','Marruecos':'ΏθΘ▓ΏθΘο','Costa de Marfil':'ΏθΘρΏθΘχ','Noruega':'ΏθΘ│ΏθΘ┤','Francia':'ΏθΘτΏθΘ╖','Suecia':'ΏθΘ╕ΏθΘς','Mexico':'ΏθΘ▓ΏθΘ╜','Ecuador':'ΏθΘςΏθΘρ','Inglaterra':'ΏθΠ┤','RD Congo':'ΏθΘρΏθΘσ','Belgica':'ΏθΘπΏθΘς','Senegal':'ΏθΘ╕ΏθΘ│','EE.UU.':'ΏθΘ║ΏθΘ╕','Bosnia H.':'ΏθΘπΏθΘο','Espana':'ΏθΘςΏθΘ╕','Austria':'ΏθΘοΏθΘ╣','Portugal':'ΏθΘ╡ΏθΘ╣','Croacia':'ΏθΘφΏθΘ╖','Suiza':'ΏθΘρΏθΘφ','Argelia':'ΏθΘσΏθΘ┐','Australia':'ΏθΘοΏθΘ║','Egipto':'ΏθΘςΏθΘυ','Argentina':'ΏθΘοΏθΘ╖','Cabo Verde':'ΏθΘρΏθΘ╗','Colombia':'ΏθΘ┤','Ghana':'ΏθΘυΏθΘφ'};
  return m[c]||'ΏθΠ│Ύ╕Π';
}

function teamData(name){
  return TEAMS[cleanName(name)]||null;
}

function getKO(n){
  var cn=cleanName(n),res=[];
  if(!KO_DATA||!KO_DATA.rounds)return res;
  KO_DATA.rounds.forEach(function(r){
    r.matches.forEach(function(m){
      if(m.status!=='played')return;
      var hn=cleanName(m.home),an=cleanName(m.away);
      if(hn!==cn&&an!==cn)return;
      var ih=hn===cn;
      var ms=ih?m.hscore:m.ascore,os=ih?m.ascore:m.hscore;
      res.push({s:ms+'\u2013'+os,o:ih?m.away:m.home,r:ms>os?'w':ms<os?'l':'d',label:r.name.replace(' de final','')});
    });
  });
  return res;
}

function renderBracket(){
  var bracket=document.getElementById('bracket');
  var svg=document.getElementById('linesSvg');
  var rounds=KO_DATA.rounds;
  if(!rounds||!rounds.length)return;

  bracket.innerHTML='';
  bracket.appendChild(svg);
  svg.innerHTML='';

  var colW=100/rounds.length;
  var matchHeights=[];
  var matchPositions=[];

  // Build rounds
  rounds.forEach(function(round,ri){
    var col=document.createElement('div');col.className='round';
    col.style.flex='1';
    var title=document.createElement('div');title.className='round-title';
    title.textContent=round.name;
    if(ri===rounds.length-1)title.className+=' round-title-final';
    col.appendChild(title);
    
    var n=round.matches.length;
    var gapPct=ri===rounds.length-1?50:100/(n*2); // each match gets 2 slots (half for gap)
    // For round with n matches, each match takes (100/n)% of the height
    var matchPct=ri===rounds.length-1?80:90/n;
    var startPct=ri===rounds.length-1?10:5;
    
    round.matches.forEach(function(m,mi){
      var wrap=document.createElement('div');wrap.className='match-wrap';
      var matchH=((matchPct/n)*100); // percentage of this round
      var top=startPct+mi*(matchPct/n)*100;
      
      // For non-final rounds, space them to allow for connecting lines
      if(ri<rounds.length-1){
        var spacing=100/(n*2);
        top=spacing+mi*(spacing*2);
        matchH=spacing*1.4;
      } else {
        top=42;matchH=16;
      }
      
      wrap.style.top=top+'%';
      wrap.style.height=matchH+'%';
      matchPositions[ri]=matchPositions[ri]||[];
      matchPositions[ri].push({top:top,height:matchH});
      
      var card=document.createElement('div');card.className='match';
      if(m.status==='played')card.classList.add('played');
      if(m.status==='live')card.classList.add('live');
      
      var hw='',aw='';
      if(m.hscore!==null&&m.ascore!==null){
        if(m.hscore>m.ascore)hw='winner';else if(m.ascore>m.hscore)aw='winner';
      }
      var hs=m.hscore!==null?m.hscore:'-',as=m.ascore!==null?m.ascore:'-';
      var hf=m.home.indexOf('Gan.')===0?'ΏθΠΗ':teamFlag(m.home);
      var af=m.away.indexOf('Gan.')===0?'ΏθΠΗ':teamFlag(m.away);
      
      var hName=m.home.indexOf('Gan.')===0?m.home:m.home;
      var aName=m.away.indexOf('Gan.')===0?m.away:m.away;
      
      // Store team names for modal
      var hTeam=cleanName(m.home),aTeam=cleanName(m.away);
      var hHasData=!!TEAMS[hTeam];
      var aHasData=!!TEAMS[aTeam];
      
      card.innerHTML='<div class="team '+hw+'"><span class="flag">'+hf+'</span><span class="name">'+hName+'</span><span class="score">'+hs+'</span></div>'+
        '<div class="team '+aw+'"><span class="flag">'+af+'</span><span class="name">'+aName+'</span><span class="score">'+as+'</span></div>'+
        (m.extra?'<div class="m-extra">'+m.extra+'</div>':'');
      
      card.addEventListener('click',function(e){
        e.stopPropagation();
        showModal(m);
      });
      
      wrap.appendChild(card);
      col.appendChild(wrap);
    });
    
    bracket.appendChild(col);
  });

  // Draw SVG lines after layout
  requestAnimationFrame(function(){drawLines(rounds);});
  
  // Also draw after a short delay for layout settle
  setTimeout(function(){drawLines(rounds);},100);
}

function drawLines(rounds){
  var svg=document.getElementById('linesSvg');
  var bracket=document.getElementById('bracket');
  if(!svg||!bracket)return;
  
  var bw=bracket.offsetWidth, bh=bracket.offsetHeight;
  if(!bw||!bh)return;
  
  svg.setAttribute('viewBox','0 0 '+bw+' '+bh);
  svg.innerHTML='';
  
  var colW=bw/rounds.length;
  var ns=svg.namespaceURI||'http://www.w3.org/2000/svg';
  
  function addLine(x1,y1,x2,y2,played){
    var l=document.createElementNS(ns,'line');
    l.setAttribute('x1',x1);l.setAttribute('y1',y1);
    l.setAttribute('x2',x2);l.setAttribute('y2',y2);
    l.setAttribute('stroke',played?'var(--green)':'var(--lgray)');
    l.setAttribute('stroke-width','1.5');
    l.setAttribute('stroke-linecap','round');
    if(!played)l.setAttribute('stroke-dasharray','3,3');
    svg.appendChild(l);
  }
  
  function addPath(points,played){
    if(points.length<2)return;
    var p=document.createElementNS(ns,'path');
    var d='M '+points[0][0]+' '+points[0][1];
    for(var i=1;i<points.length;i++){
      d+=' L '+points[i][0]+' '+points[i][1];
    }
    p.setAttribute('d',d);
    p.setAttribute('fill','none');
    p.setAttribute('stroke',played?'var(--green)':'var(--lgray)');
    p.setAttribute('stroke-width','1.5');
    p.setAttribute('stroke-linecap','round');
    p.setAttribute('stroke-linejoin','round');
    if(!played)p.setAttribute('stroke-dasharray','3,3');
    svg.appendChild(p);
  }

  function getMatchCenter(ri,mi){
    var roundEl=bracket.children[ri+1]; // +1 because svg is first child
    if(!roundEl)return null;
    var wraps=roundEl.querySelectorAll('.match-wrap');
    if(!wraps[mi])return null;
    var wrapRect=wraps[mi].getBoundingClientRect();
    var bracketRect=bracket.getBoundingClientRect();
    return {
      left:(wrapRect.left-bracketRect.left)/bw*bw,
      right:(wrapRect.right-bracketRect.left)/bw*bw,
      top:(wrapRect.top-bracketRect.top)/bh*bh,
      bottom:(wrapRect.bottom-bracketRect.top)/bh*bh,
      centerY:((wrapRect.top+wrapRect.bottom)/2-bracketRect.top)/bh*bh,
      centerX:((wrapRect.left+wrapRect.right)/2-bracketRect.left)/bw*bw
    };
  }

  // Draw connections between rounds
  for(var ri=0;ri<rounds.length-1;ri++){
    var n=rounds[ri].matches.length;
    for(var mi=0;mi<n;mi++){
      var src=getMatchCenter(ri,mi);
      var dst=getMatchCenter(ri+1,Math.floor(mi/2));
      if(!src||!dst)continue;
      
      var m=rounds[ri].matches[mi];
      var mNext=rounds[ri+1].matches[Math.floor(mi/2)];
      var isPlayed=m&&m.status==='played';
      
      // Horizontal line from right edge of source match to the round boundary
      var hEnd=src.right+(colW*0.3);
      // Cap hEnd to not exceed the next round's left edge
      hEnd=Math.min(hEnd,dst.left-colW*0.08);
      
      addPath([
        [src.right,src.centerY],
        [hEnd,src.centerY],
        [hEnd,dst.centerY],
        [dst.left,dst.centerY]
      ], isPlayed);
    }
  }
}

function showModal(m){
  if(!m)return;
  var body=document.getElementById('modalBody');
  var h='';
  
  function addTeamSide(name,side,score,isWinner){
    var cn=cleanName(name);
    if(name.indexOf('Gan.')===0){h+='<div class="team-row"><span style="font-size:1.5rem">ΏθΠΗ</span><span style="font-size:.9rem;font-weight:600">'+name+'</span></div>';return}
    var t=TEAMS[cn];
    if(!t){h+='<div class="team-row"><span style="font-size:1.5rem">'+teamFlag(name)+'</span><span style="font-size:.9rem;font-weight:600;color:'+(isWinner?'var(--green)':'')+'">'+name+'</span><span style="font-size:1rem;font-weight:800;color:var(--blue);margin-left:auto">'+score+'</span></div>';return}
    var f=t.flag||teamFlag(name);
    var barColor=t.rating>=80?'var(--green)':t.rating>=60?'var(--blue)':t.rating>=40?'#f0a500':'var(--red)';
    h+='<div class="team-row" style="cursor:pointer" onclick="showTeamProfile(\''+name.replace(/'/g,"\\'")+'\')"><span style="font-size:1.5rem">'+f+'</span><span style="font-size:.9rem;font-weight:600;color:'+(isWinner?'var(--green)':'')+'">'+name+'</span><span style="font-size:1rem;font-weight:800;color:var(--blue);margin-left:auto">'+score+'</span></div>';
    h+='<div style="font-size:.5rem;color:var(--muted);margin-top:-2px;margin-bottom:4px;padding-left:2.2rem">'+t.pos+' Grupo '+t.group+' &middot; '+t.pts+' pts &middot; FIFA #'+t.fifa_rank+' &middot; Rating: '+t.rating+'/100</div>';
  }
  
  h+='<div style="font-size:.6rem;color:var(--muted);margin-bottom:6px;text-align:center">'+m.date+(m.stadium?' &middot; '+m.stadium:'')+'</div>';
  addTeamSide(m.home,'home',m.hscore!==null?m.hcore:'-',m.hscore!==null&&m.ascore!==null&&m.hscore>m.ascore);
  addTeamSide(m.away,'away',m.ascore!==null?m.ascore:'-',m.hscore!==null&&m.ascore!==null&&m.ascore>m.hscore);
  if(m.extra)h+='<div style="font-size:.6rem;color:var(--muted);font-style:italic;text-align:center;margin-top:4px">'+m.extra+'</div>';
  
  // Knockout results for both teams
  [m.home,m.away].forEach(function(tName){
    if(tName.indexOf('Gan.')===0)return;
    var cn=cleanName(tName);
    if(!TEAMS[cn])return;
    var ko=getKO(tName);
    if(ko.length){
      h+='<div class="sec" style="margin-top:8px"><h4>'+tName+' έΑΦ Eliminatorias</h4>';
      ko.forEach(function(k){
        h+='<div class="row"><span>'+(k.r==='w'?'έγ╜':k.r==='d'?'Ώθνζ':'έζΝ')+'</span><span>'+k.s+' vs '+k.o+' <small style="opacity:.6">('+k.label+')</small></span></div>';
      });
      h+='</div>';
    }
  });
  
  body.innerHTML=h;
  _modalData=m;
  document.getElementById('modal').style.display='flex';
}
function closeModal(){document.getElementById('modal').style.display='none'}
function showTeamProfile(name){
  closeModal();
  var cn=cleanName(name),t=TEAMS[cn];
  if(!t)return;
  var body=document.getElementById('modalBody');
  var barColor=t.rating>=80?'var(--green)':t.rating>=60?'var(--blue)':t.rating>=40?'#f0a500':'var(--red)';
  var formDots='<span style="display:flex;gap:2px">'+(t.form||[]).map(function(r){var c=r==='V'?'w':r==='E'?'d':'l',cl=r==='V'?'var(--green)':r==='E'?'#b8960c':'var(--red)';return'<span style="width:10px;height:10px;border-radius:2px;background:'+cl+';font-size:.35rem;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700">'+(r==='V'?'V':r==='E'?'E':'D')+'</span>';}).join('')+'</span>';
  var h='<div class="tf">'+(t.flag||teamFlag(name))+'</div><div class="tn">'+name+'</div><div class="ts">'+t.conf+' &middot; FIFA #'+(t.fifa_rank||'?')+' &middot; '+(t.apps||'?')+' Mundial &middot; Mejor: '+(t.best||'?')+'</div>';
  h+='<div class="gr"><div class="st"><div class="v">'+t.pts+'</div><div class="l">Puntos</div></div><div class="st"><div class="v">'+t.dg+'</div><div class="l">Dif. Gol</div></div><div class="st"><div class="v">'+t.pos+'</div><div class="l">Grupo '+t.group+'</div></div><div class="st"><div class="v">'+t.played+' PJ</div><div class="l">Partidos</div></div></div>';
  h+='<div class="bar"><div class="bar-l"><span>Calidad</span><span>'+(t.rating||50)+'/100</span></div><div class="bar-f"><div class="bar-fill" style="width:'+(t.rating||50)+'%;background:'+barColor+'"></div></div></div>';
  if(t.form&&t.form.length)h+='<div style="font-size:.5rem;color:var(--muted);margin-bottom:6px">Forma: '+formDots+'</div>';
  var matches=t.matches_detail||[];
  if(matches.length){h+='<div class="sec"><h4>Fase de grupos</h4>';matches.forEach(function(mt){h+='<div class="row"><span>'+(mt.result==='w'?'έγ╜':mt.result==='d'?'Ώθνζ':'έζΝ')+'</span><span>'+mt.score+' vs '+mt.opponent+'</span></div>'});h+='</div>'}
  var ko=getKO(name);
  if(ko.length){h+='<div class="sec" style="margin-top:6px"><h4>Eliminatorias</h4>';ko.forEach(function(k){h+='<div class="row"><span>'+(k.r==='w'?'έγ╜':k.r==='d'?'Ώθνζ':'έζΝ')+'</span><span>'+k.s+' vs '+k.o+' <small style="opacity:.6">('+k.label+')</small></span></div>'});h+='</div>'}
  body.innerHTML=h;
  document.getElementById('modal').style.display='flex';
}

function toggleChangelog(){
  var el=document.getElementById('chlog');
  if(el.style.display==='flex'){el.style.display='none';return}
  document.getElementById('chlogBody').innerHTML=CHANGELOG.map(function(e){return'<div class="entry"><strong style="color:var(--blue)">v'+e.v+'</strong> <span style="color:var(--muted);font-size:.5rem">'+e.date+'</span><br>'+e.text+'</div>'}).join('');
  el.style.display='flex';
}

function formatVersion(iso){
  if(!iso||iso==='?')return 'v'+VERSION_COUNT+' &middot; --';
  try{var d=new Date(iso);return 'v'+VERSION_COUNT+' &middot; '+('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+' '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)}catch(e){return 'v'+VERSION_COUNT+' &middot; '+iso}
}

function updateTimers(){
  var n=new Date(),nx=new Date(Math.ceil(n.getTime()/1800000)*1800000+480000);
  document.getElementById('nextUpdate').textContent=nx.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  var d=Math.max(0,Math.floor((nx-n)/1000));
  document.getElementById('countdown').textContent='('+Math.floor(d/60)+':'+('0'+(d%60)).slice(-2)+')';
  if(d===0&&typeof KO_DATA!==undefined&&KO_DATA)loadData();
  setTimeout(updateTimers,1000);
}

loadData();
setTimeout(updateTimers,100);
setInterval(loadData,60000);
window.addEventListener('resize',function(){
  if(KO_DATA&&KO_DATA.rounds)setTimeout(function(){drawLines(KO_DATA.rounds)},200);
});
</script>
</body>
</html>
