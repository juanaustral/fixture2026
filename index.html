function buscarEquipo(nombre,grupos){for(const g of grupos)for(const t of g.teams)if(t.n.toLowerCase().includes(nombre.toLowerCase())||nombre.toLowerCase().includes(t.n.toLowerCase()))return{equipo:t,grupo:g.name};return null}

// ── WIDGET RENDER ──
function renderWidget(){
  const grid=document.getElementById('widgetGrid');
  upcoming.forEach(m=>{
    const hInfo=buscarEquipo(m.h.replace(/[^a-zA-Záéíóúñü ]/g,'').trim(),G);
    const aInfo=buscarEquipo(m.a.replace(/[^a-zA-Záéíóúñü ]/g,'').trim(),G);
    let analisis='';
    if(hInfo&&aInfo){
      const h=hInfo.equipo,a=aInfo.equipo;
      const hSit=h.st,aSit=a.st;
      analisis='<strong>'+h.f+' '+h.n+':</strong> '+hSit.toLowerCase()+'. ';
      if(h.rq)analisis+=h.rq+'. ';
      analisis+='<br><strong>'+a.f+' '+a.n+':</strong> '+aSit.toLowerCase()+'. ';
      if(a.rq)analisis+=a.rq+'.';
    }
    const card=document.createElement('div');
    card.className='w-match';
    card.innerHTML='<div class="w-teams"><span class="w-group">'+m.g+'</span>'+m.h+' <span class="vs">vs</span> '+m.a+' <span class="w-time">'+m.t+'</span></div><div class="w-analysis">'+analisis+'</div>';
    grid.appendChild(card);
  });
}

// ── GROUPS RENDER ──
function render(){
  const app=document.getElementById('app');
  G.forEach((g,i)=>{
    const card=document.createElement('div');
    card.className='group-card t'+(i%5);
    let h='<h2>'+g.name+'<span class="badge">Jornada '+g.teams[0].ps+'/3</span></h2>';
    h+='<table><thead><tr><th>Equipo</th><th class="c">Pts</th><th class="c">PP</th><th>Estado</th></tr></thead><tbody>';
    g.teams.forEach((t,j)=>{
      const r=j%2===0?'tr-even':'tr-odd';
      h+='<tr class="'+r+'"><td class="team"><span class="flag">'+t.f+'</span>'+t.n+'</td><td class="pts c">'+t.p+'</td><td class="c">'+t.pp+'</td><td><span class="st-tag '+t.sc+'">'+t.st+'</span></td></tr>';
      h+='<tr class="'+r+'"><td colspan="4"><div class="m-line"><span class="mlb">Jugados</span> ';
      t.m.forEach((m,j)=>{if(j)h+=' · ';h+='<span class="m'+(m.r==='w'?'w':m.r==='d'?'d':'l')+'">'+m.v+' vs '+m.c+'</span>'});
      if(t.pn.length){h+=' &nbsp;|&nbsp; <span class="mlb">Pendiente</span> ';t.pn.forEach((p,j)=>{if(j)h+=' · ';h+='<span class="mp">vs '+p.vf+' '+p.v+' ('+p.d+')</span>'})}
      if(t.rq)h+='<div class="req-line">→ '+t.rq+'</div>';
      h+='</div></td></tr>';
    });
    h+='</tbody></table>';
    if(g.pend&&g.pend!=='—')h+='<div class="pendientes"><strong>⏳ Pendientes:</strong> '+g.pend+'</div>';
    h+='<div class="group-reqs"><strong>Estado del grupo:</strong><br>'+g.reqs.map(r=>'<div>'+r+'</div>').join('')+'</div>';
    card.innerHTML=h;app.appendChild(card);
  });
  document.getElementById('lastUpdate').textContent=new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'numeric'})+' '+new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})+' ARG';
}

// ── UPDATE TIMER ──
function updateTimers(){
  var now=new Date();
  if(!updateTimers._last)updateTimers._last=now;
  var last=updateTimers._last;
  document.getElementById('lastUpdate').textContent=last.toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'numeric'})+' '+last.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})+' ARG';
  var next=new Date(Math.ceil(now.getTime()/1800000)*1800000+300000);
  document.getElementById('nextUpdate').textContent=next.toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'numeric'})+' '+next.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})+' ARG';
  var diff=Math.max(0,Math.floor((next-now)/1000));
  document.getElementById('countdown').textContent='(en '+Math.floor(diff/60)+':'+('0'+(diff%60)).slice(-2)+')';
  if(diff===0)location.reload(true);else setTimeout(updateTimers,1000);
}
