<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixture 2026 — Fase Eliminatoria</title>
<style>
:root{--green:#3CAC3B;--blue:#2A398D;--red:#E61D25;--lgray:#D1D4D1;--dgray:#474A4A;--bg:#eff0ed;--card:#fff;--border:#dde0dc;--text:#2a2d2d;--muted:#6b706e;--radius:8px;--shadow:0 1px 3px rgba(0,0,0,.05);--cw:220px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.3;min-height:100vh;display:flex;flex-direction:column}

/* ── HEADER ── */
.header{display:flex;align-items:center;justify-content:center;gap:10px;padding:7px 14px;flex-shrink:0;border-bottom:1px solid var(--border);background:var(--bg);z-index:20;flex-wrap:wrap}
.header h1{font-size:1.05rem;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,var(--red),var(--blue),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
.header .meta{display:flex;align-items:center;gap:8px;font-size:.55rem;color:var(--muted)}
.header .meta .countdown{color:var(--blue);font-weight:600}
.header .visor-link{font-size:.52rem;color:var(--green);text-decoration:none;font-weight:600;padding:2px 8px;border:1px solid rgba(60,172,59,.25);border-radius:12px;white-space:nowrap}
.header .version-link{font-size:.48rem;color:var(--muted);text-decoration:none;border-bottom:1px dotted var(--muted);white-space:nowrap}

@media(max-width:600px){
  .header{gap:4px;padding:4px 6px}
  .header h1{font-size:.8rem}
  .header .visor-link{font-size:.48rem;padding:1px 5px}
  .header .meta{font-size:.48rem;gap:4px}
}

/* ── BRACKET WRAPPER (scrollable) ── */
.bracket-wrap{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;min-height:0}
.bracket-scroll{min-height:100%;position:relative;padding:6px 4px 12px}
.bracket{display:flex;gap:0;width:100%;position:relative}

/* ── ROUND COLUMN ── */
.round{
  display:flex;flex-direction:column;flex:1;min-width:0;
  position:relative;padding:0 4px;
}
.round:first-child{padding-left:0}
.round:last-child{padding-right:0}
.round-title{
  font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
  color:#fff;text-align:center;padding:4px 6px;background:var(--blue);
  border-radius:var(--radius);margin-bottom:6px;flex-shrink:0;z-index:5;position:sticky;top:0;
}
.round:last-child .round-title{background:linear-gradient(135deg,#c9a84c,#f5d76e,#c9a84c);color:var(--dgray)}

/* ── SVG LINES ── */
#linesSvg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1}

/* ── MATCH NODE ── */
.match-wrap{position:absolute;left:0;right:0;z-index:2;padding:0 1px}
.match{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:5px 6px 4px;cursor:pointer;transition:all .15s;height:100%;
  display:flex;flex-direction:column;
}
.match:hover{z-index:10;border-color:var(--blue);box-shadow:0 2px 12px rgba(42,57,141,.18)}
.match.played{background:linear-gradient(135deg,rgba(60,172,59,.04),var(--card))}
.match.live{border-color:var(--red);animation:lp 2s infinite}
@keyframes lp{0%,100%{box-shadow:0 0 0 0 rgba(230,29,37,.15)}50%{box-shadow:0 0 0 5px rgba(230,29,37,0)}}

.match .mrow{display:flex;align-items:center;gap:3px;padding:1px 0}
.match .mrow .flag{font-size:.75rem;flex-shrink:0;line-height:1;width:18px;text-align:center}
.match .mrow .name{font-size:.62rem;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.match .mrow .score{font-size:.62rem;font-weight:800;color:var(--blue);text-align:right;flex-shrink:0;min-width:16px}
.match .mrow.winner .name,.match .mrow.winner .score{color:var(--green);font-weight:700}

/* Stats row below team */
.match .srow{display:flex;align-items:center;gap:3px;padding:0 0 0 18px;margin-top:-1px;margin-bottom:1px}
.match .srow .stag{
  font-size:.5rem;color:var(--muted);background:rgba(42,57,141,.05);
  padding:0 4px;border-radius:3px;white-space:nowrap;line-height:1.6;
}
.match .srow .fdots{display:flex;gap:1px;margin-left:2px}
.match .srow .fd{width:7px;height:7px;border-radius:1.5px;font-size:.35rem;display:flex;align-items:center;justify-content:center}
.match .srow .fd.w{background:rgba(60,172,59,.18)}
.match .srow .fd.d{background:rgba(184,150,12,.12)}
.match .srow .fd.l{background:rgba(230,29,37,.12)}

.match .mfoot{display:flex;justify-content:space-between;align-items:center;margin-top:1px;padding-top:1px;border-top:1px solid var(--border)}
.match .mfoot .mdate{font-size:.48rem;color:var(--muted)}
.match .mfoot .mextra{font-size:.45rem;color:var(--muted);font-style:italic}

/* Future rounds: simpler */
.round:not(:first-child) .match .srow .fdots{display:none}
.round:not(:first-child) .match .mrow .name{font-size:.58rem}

/* ── MODAL ── */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;padding:12px}
#modal .box{background:var(--card);border-radius:12px;padding:18px;max-width:400px;width:100%;max-height:80vh;overflow-y:auto;position:relative}
#modal .close{position:absolute;top:6px;right:8px;background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--muted)}
#modal .tf{font-size:2rem;text-align:center}
#modal .tn{font-size:1rem;font-weight:800;text-align:center}
#modal .ts{font-size:.6rem;text-align:center;color:var(--muted);margin-bottom:8px}
#modal .gr{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:8px}
#modal .st{background:#f6f7f5;border-radius:8px;padding:6px 8px;text-align:center}
#modal .st .v{font-size:.9rem;font-weight:800;color:var(--blue)}
#modal .st .l{font-size:.48rem;color:var(--muted);text-transform:uppercase}
#modal .bar{margin:6px 0}
#modal .bar-l{display:flex;justify-content:space-between;font-size:.5rem;color:var(--muted)}
#modal .bar-f{height:5px;border-radius:3px;background:var(--border);overflow:hidden}
#modal .bar-fill{height:100%;border-radius:3px}
#modal .sec h4{font-size:.6rem;color:var(--blue);margin-bottom:3px;text-transform:uppercase}
#modal .sec .row{display:flex;align-items:center;gap:4px;font-size:.58rem;padding:2px 0;border-bottom:1px solid rgba(0,0,0,.03)}

/* ── CHANGELOG ── */
#chlog{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;align-items:center;justify-content:center;padding:12px}
#chlog .box{background:var(--card);border-radius:12px;padding:18px;max-width:400px;width:100%;max-height:70vh;overflow-y:auto}
#chlog .entry{margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid var(--border);font-size:.62rem}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .bracket-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .bracket{min-width:800px}
}
</style>
</head>
<body>

<div class="header">
  <h1>Fixture 2026</h1>
  <div class="meta">
    <span>Prox: <strong id="nextUpdate">-</strong> <span class="countdown" id="countdown"></span></span>
    <a href="https://juanaustral.github.io/visormundial/" class="visor-link" target="_blank">Ver en vivo</a>
    <a href="#" onclick="toggleChangelog();return false" class="version-link" id="versionTag">--</a>
  </div>
</div>

<div class="bracket-wrap">
  <div class="bracket-scroll">
    <div class="bracket" id="bracket">
      <svg id="linesSvg"></svg>
    </div>
  </div>
</div>

<div id="modal" onclick="if(event.target===this)closeModal()">
  <div class="box"><button class="close" onclick="closeModal()">&#10005;</button><div id="modalBody"></div></div>
</div>

<div id="chlog" onclick="if(event.target===this)document.getElementById('chlog').style.display='none'">
  <div class="box">
    <h3 style="font-size:.75rem;color:var(--blue);margin-bottom:8px">Historial de versiones</h3>
    <div id="chlogBody"></div>
    <button onclick="document.getElementById('chlog').style.display='none'" style="margin-top:8px;background:var(--blue);color:#fff;border:none;padding:4px 14px;border-radius:6px;cursor:pointer;font-size:.6rem;font-weight:600">Cerrar</button>
  </div>
</div>

<script>
var API='https://raw.githubusercontent.com/juanaustral/fixture2026/main/data_ko.json';
var KO_DATA=null,TEAMS={};
var VERSION_COUNT=30;
var CHANGELOG=[
  {v:30,date:'4 jul',text:'Rediseno bracket: lineas SVG + datos completos por equipo (grupo, puntos, forma) visibles en cada partido.'},
  {v:29,date:'4 jul',text:'Rediseno: bracket horizontal compacto con lineas SVG de conexion.'},
  {v:28,date:'4 jul',text:'Marruecos 3-0 Canada (completado). Marruecos avanza a cuartos.'},
  {v:27,date:'4 jul',text:'Octavos: Canada vs Marruecos y Paraguay vs Francia hoy 4 jul.'},
  {v:26,date:'3 jul',text:'Suiza 2-0 Argelia (16avos completado). Suiza avanza a octavos.'},
  {v:25,date:'2 jul',text:'EN VIVO: Espana vs Austria y Portugal vs Croacia.'},
  {v:24,date:'2 jul',text:'16avos: Espana vs Austria y Portugal vs Croacia hoy. Octavos con cruces.'},
  {v:23,date:'1 jul',text:'USA 2-0 Bosnia en 16avos. USA avanza a octavos vs Belgica.'},
  {v:22,date:'30 jun',text:'Francia 3-0 Suecia en 16avos.'},
];

function loadData(){
  fetch(API).then(function(r){return r.json()}).then(function(d){
    KO_DATA=d;TEAMS=d.teams||{};
    document.getElementById('versionTag').textContent=formatVersion(d.updated);
    renderBracket();
  }).catch(function(){
    try{
      KO_DATA=JSON.parse('{"updated":"?","teams":{},"rounds":[]}');
    }catch(e){}
    renderBracket();
  });
}

function cleanName(n){if(!n)return'';return n.replace(/ [\u{1F1E6}-\u{1F1FF}]{2}$/u,'').trim()}

function teamFlag(name){
  var c=cleanName(name),t=TEAMS[c];
  if(t&&t.flag)return t.flag;
  var m={
    'Sudafrica':'🇿🇦','Canada':'🇨🇦','Brasil':'🇧🇷','Japon':'🇯🇵','Alemania':'🇩🇪',
    'Paraguay':'🇵🇾','Paises Bajos':'🇳🇱','Marruecos':'🇲🇦','Costa de Marfil':'🇨🇮',
    'Noruega':'🇳🇴','Francia':'🇫🇷','Suecia':'🇸🇪','Mexico':'🇲🇽','Ecuador':'🇪🇨',
    'Inglaterra':'🏴','RD Congo':'🇨🇩','Belgica':'🇧🇪','Senegal':'🇸🇳','EE.UU.':'🇺🇸',
    'Bosnia H.':'🇧🇦','Espana':'🇪🇸','Austria':'🇦🇹','Portugal':'🇵🇹','Croacia':'🇭🇷',
    'Suiza':'🇨🇭','Argelia':'🇩🇿','Australia':'🇦🇺','Egipto':'🇪🇬','Argentina':'🇦🇷',
    'Cabo Verde':'🇨🇻','Colombia':'🇴','Ghana':'🇬🇭'
  };
  return m[c]||'🏳️';
}

function teamStats(name){
  var c=cleanName(name),t=TEAMS[c];
  if(!t||!t.group||name.indexOf('Gan.')===0)return '';
  var h='<span class="stag">'+t.pos+' Gr '+t.group+'</span><span class="stag">'+t.pts+' pts</span>';
  if(t.form&&t.form.length){
    h+='<span class="fdots">'+t.form.map(function(r){var cls=r==='V'?'w':r==='E'?'d':'l';return'<span class="fd '+cls+'">'+r+'</span>';}).join('')+'</span>';
  }
  return h;
}

function getKO(n){
  var cn=cleanName(n),res=[];
  if(!KO_DATA||!KO_DATA.rounds)return res;
  KO_DATA.rounds.forEach(function(r){
    r.matches.forEach(function(m){
      if(m.status!=='played')return;
      var hn=cleanName(m.home),an=cleanName(m.away);
      if(hn!==cn&&an!==cn)return;
      var ih=hn===cn;
      res.push({
        s:(ih?m.hscore:m.ascore)+'\u2013'+(ih?m.ascore:m.hscore),
        o:ih?m.away:m.home,
        r:(ih?m.hscore:m.ascore)>(ih?m.ascore:m.hscore)?'w':
          (ih?m.hscore:m.ascore)<(ih?m.ascore:m.hscore)?'l':'d',
        label:r.name.replace(' de final','')
      });
    });
  });
  return res;
}

function renderBracket(){
  var bracket=document.getElementById('bracket');
  var svg=document.getElementById('linesSvg');
  var rounds=KO_DATA.rounds;
  if(!rounds||!rounds.length)return;

  bracket.innerHTML='';
  bracket.appendChild(svg);
  svg.innerHTML='';

  // Calculate round column widths proportional to match count
  var maxMatches=rounds[0].matches.length;
  var posMap=[];

  rounds.forEach(function(round,ri){
    var col=document.createElement('div');col.className='round';
    var n=round.matches.length;
    var title=document.createElement('div');title.className='round-title';
    title.textContent=ri===rounds.length-1?'🏆 '+round.name:round.name;
    col.appendChild(title);

    // For the first round (most matches), space is tight
    // Use proportional spacing: each pair of matches gets 100/(n/2)% of height
    var totalH=100;
    var spacing=ri<rounds.length-1?totalH/(n*2):totalH/2; // slot per match
    var matchH=ri<rounds.length-1?spacing*1.5:spacing*0.8;
    var startOffset=ri<rounds.length-1?spacing*0.3:(totalH-matchH)/2;

    posMap[ri]=[];

    round.matches.forEach(function(m,mi){
      var wrap=document.createElement('div');wrap.className='match-wrap';
      var top=startOffset+mi*(spacing*2);
      // adjust so it doesn't overflow
      if(top+matchH>98)top=98-matchH;
      wrap.style.top=top+'%';
      wrap.style.height=matchH+'%';
      posMap[ri].push({top:top,height:matchH});

      var card=document.createElement('div');card.className='match';
      if(m.status==='played')card.classList.add('played');
      if(m.status==='live')card.classList.add('live');

      var hw='',aw='';
      if(m.hscore!==null&&m.ascore!==null){
        if(m.hscore>m.ascore)hw='winner';else if(m.ascore>m.hscore)aw='winner';
      }
      var hs=m.hscore!==null?m.hscore:'-',as=m.ascore!==null?m.ascore:'-';
      var hf=m.home.indexOf('Gan.')===0?'🏆':teamFlag(m.home);
      var af=m.away.indexOf('Gan.')===0?'🏆':teamFlag(m.away);
      var hName=m.home,aName=m.away;

      // Stats rows
      var hStats=ri<2?teamStats(m.home):'';
      var aStats=ri<2?teamStats(m.away):'';

      card.innerHTML=
        '<div class="mrow '+hw+'"><span class="flag">'+hf+'</span><span class="name">'+hName+'</span><span class="score">'+hs+'</span></div>'+
        (hStats?'<div class="srow">'+hStats+'</div>':'')+
        '<div class="mrow '+aw+'"><span class="flag">'+af+'</span><span class="name">'+aName+'</span><span class="score">'+as+'</span></div>'+
        (aStats?'<div class="srow">'+aStats+'</div>':'')+
        '<div class="mfoot"><span class="mdate">'+m.date+(m.stadium?' &middot; '+m.stadium:'')+'</span>'+
        (m.extra?'<span class="mextra">'+m.extra+'</span>':'')+'</div>';

      card.addEventListener('click',function(e){
        e.stopPropagation();
        showModal(m);
      });

      wrap.appendChild(card);
      col.appendChild(wrap);
    });

    bracket.appendChild(col);
  });

  // Draw lines
  requestAnimationFrame(function(){drawLines(rounds,posMap);});
  setTimeout(function(){drawLines(rounds,posMap);},150);
}

function drawLines(rounds,posMap){
  var svg=document.getElementById('linesSvg');
  var bracket=document.getElementById('bracket');
  if(!svg||!bracket)return;

  var bw=bracket.offsetWidth,bh=bracket.offsetHeight;
  if(!bw||!bh)return;
  svg.setAttribute('viewBox','0 0 '+bw+' '+bh);
  svg.innerHTML='';

  var ns='http://www.w3.org/2000/svg';
  var colW=bw/rounds.length;

  function addPath(pts,played){
    if(pts.length<2)return;
    var p=document.createElementNS(ns,'path');
    var d='M '+pts[0][0]+' '+pts[0][1];
    for(var i=1;i<pts.length;i++)d+=' L '+pts[i][0]+' '+pts[i][1];
    p.setAttribute('d',d);
    p.setAttribute('fill','none');
    p.setAttribute('stroke',played?'var(--green)':'var(--lgray)');
    p.setAttribute('stroke-width',played?'2':'1.5');
    p.setAttribute('stroke-linecap','round');
    p.setAttribute('stroke-linejoin','round');
    if(!played)p.setAttribute('stroke-dasharray','4,3');
    svg.appendChild(p);
  }

  function getMatchCenter(ri,mi){
    // Get the round column element (svg is child 0, rounds start at child 1)
    var roundEl=bracket.children[ri+1];
    if(!roundEl)return null;
    var wraps=roundEl.querySelectorAll('.match-wrap');
    if(!wraps[mi])return null;
    var wr=wraps[mi].getBoundingClientRect();
    var br=bracket.getBoundingClientRect();
    return {
      right:(wr.right-br.left)/bw*bw,
      top:(wr.top-br.top)/bh*bh,
      bottom:(wr.bottom-br.top)/bh*bh,
      centerY:((wr.top+wr.bottom)/2-br.top)/bh*bh,
      left:(wr.left-br.left)/bw*bw
    };
  }

  for(var ri=0;ri<rounds.length-1;ri++){
    var n=rounds[ri].matches.length;
    for(var mi=0;mi<n;mi++){
      var src=getMatchCenter(ri,mi);
      var dst=getMatchCenter(ri+1,Math.floor(mi/2));
      if(!src||!dst)continue;

      var m=rounds[ri].matches[mi];
      var isPlayed=m&&m.status==='played';
      var hEnd=Math.min(src.right+colW*0.25,dst.left-colW*0.06);

      addPath([
        [src.right,src.centerY],
        [hEnd,src.centerY],
        [hEnd,dst.centerY],
        [dst.left,dst.centerY]
      ], isPlayed);
    }
  }
}

function showModal(m){
  if(!m)return;
  var body=document.getElementById('modalBody');
  var h='<div style="font-size:.6rem;color:var(--muted);margin-bottom:6px;text-align:center">'+m.date+(m.stadium?' &middot; '+m.stadium:'')+'</div>';

  function addTeam(name,score,isWinner){
    if(name.indexOf('Gan.')===0){
      h+='<div style="display:flex;align-items:center;gap:6px;padding:4px 0"><span style="font-size:1.5rem">🏆</span><span style="font-size:.85rem;font-weight:600">'+name+'</span></div>';
      return;
    }
    var cn=cleanName(name),t=TEAMS[cn];
    var f=t&&t.flag?t.flag:teamFlag(name);
    h+='<div style="display:flex;align-items:center;gap:6px;padding:4px 0;cursor:pointer" onclick="showTeamProfile(\''+name.replace(/'/g,"\\'")+'\')">';
    h+='<span style="font-size:1.5rem">'+f+'</span>';
    h+='<span style="font-size:.85rem;font-weight:600;flex:1;color:'+(isWinner?'var(--green)':'')+'">'+name+'</span>';
    h+='<span style="font-size:.85rem;font-weight:800;color:var(--blue)">'+score+'</span></div>';
    if(t&&t.group){
      h+='<div style="font-size:.52rem;color:var(--muted);margin:-2px 0 2px 2.2rem">'+t.pos+' Grupo '+t.group+' &middot; '+t.pts+' pts &middot; DG '+t.dg+' &middot; FIFA #'+(t.fifa_rank||'?')+'</div>';
    }
  }

  addTeam(m.home,m.hscore!==null?m.hscore:'-',m.hscore!==null&&m.ascore!==null&&m.hscore>m.ascore);
  addTeam(m.away,m.ascore!==null?m.ascore:'-',m.hscore!==null&&m.ascore!==null&&m.ascore>m.hscore);
  if(m.extra)h+='<div style="font-size:.58rem;color:var(--muted);font-style:italic;text-align:center;margin:4px 0">'+m.extra+'</div>';

  // Elimination results
  [m.home,m.away].forEach(function(tn){
    if(tn.indexOf('Gan.')===0)return;
    var ko=getKO(tn);
    if(ko.length){
      h+='<div class="sec" style="margin-top:8px"><h4>'+tn+' — Eliminatorias</h4>';
      ko.forEach(function(k){h+='<div class="row"><span>'+(k.r==='w'?'⚽':k.r==='d'?'🤝':'❌')+'</span><span>'+k.s+' vs '+k.o+' <small style="opacity:.6">('+k.label+')</small></span></div>';});
      h+='</div>';
    }
  });

  body.innerHTML=h;
  document.getElementById('modal').style.display='flex';
}
function closeModal(){document.getElementById('modal').style.display='none'}

function showTeamProfile(name){
  closeModal();
  var cn=cleanName(name),t=TEAMS[cn];
  if(!t)return;
  var body=document.getElementById('modalBody');
  var bc=t.rating>=80?'var(--green)':t.rating>=60?'var(--blue)':t.rating>=40?'#f0a500':'var(--red)';
  var fd='<span style="display:flex;gap:2px">'+(t.form||[]).map(function(r){
    var c=r==='V'?'var(--green)':r==='E'?'#b8960c':'var(--red)';
    return'<span style="width:9px;height:9px;border-radius:2px;background:'+c+';font-size:.3rem;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700">'+(r==='V'?'V':r==='E'?'E':'D')+'</span>';
  }).join('')+'</span>';
  var h='<div class="tf">'+(t.flag||teamFlag(name))+'</div><div class="tn">'+name+'</div><div class="ts">'+t.conf+' &middot; FIFA #'+(t.fifa_rank||'?')+' &middot; '+(t.apps||'?')+' Mundial &middot; Mejor: '+(t.best||'?')+'</div>';
  h+='<div class="gr"><div class="st"><div class="v">'+t.pts+'</div><div class="l">Puntos</div></div><div class="st"><div class="v">'+t.dg+'</div><div class="l">Dif. Gol</div></div><div class="st"><div class="v">'+t.pos+'</div><div class="l">Grupo '+t.group+'</div></div><div class="st"><div class="v">'+t.played+' PJ</div><div class="l">Partidos</div></div></div>';
  h+='<div class="bar"><div class="bar-l"><span>Calidad</span><span>'+(t.rating||50)+'/100</span></div><div class="bar-f"><div class="bar-fill" style="width:'+(t.rating||50)+'%;background:'+bc+'"></div></div></div>';
  if(t.form&&t.form.length)h+='<div style="font-size:.5rem;color:var(--muted);margin-bottom:6px">Forma: '+fd+'</div>';
  var matches=t.matches_detail||[];
  if(matches.length){h+='<div class="sec"><h4>Fase de grupos</h4>';matches.forEach(function(mt){h+='<div class="row"><span>'+(mt.result==='w'?'⚽':mt.result==='d'?'🤝':'❌')+'</span><span>'+mt.score+' vs '+mt.opponent+'</span></div>'});h+='</div>'}
  var ko=getKO(name);
  if(ko.length){h+='<div class="sec" style="margin-top:6px"><h4>Eliminatorias</h4>';ko.forEach(function(k){h+='<div class="row"><span>'+(k.r==='w'?'⚽':k.r==='d'?'🤝':'❌')+'</span><span>'+k.s+' vs '+k.o+' <small style="opacity:.6">('+k.label+')</small></span></div>'});h+='</div>'}
  body.innerHTML=h;
  document.getElementById('modal').style.display='flex';
}

function toggleChangelog(){
  var el=document.getElementById('chlog');
  if(el.style.display==='flex'){el.style.display='none';return}
  document.getElementById('chlogBody').innerHTML=CHANGELOG.map(function(e){return'<div class="entry"><strong style="color:var(--blue)">v'+e.v+'</strong> <span style="color:var(--muted);font-size:.5rem">'+e.date+'</span><br>'+e.text+'</div>'}).join('');
  el.style.display='flex';
}

function formatVersion(iso){
  if(!iso||iso==='?')return 'v'+VERSION_COUNT+' &middot; --';
  try{var d=new Date(iso);return 'v'+VERSION_COUNT+' &middot; '+('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+' '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)}catch(e){return 'v'+VERSION_COUNT+' &middot; '+iso}
}

function updateTimers(){
  var n=new Date(),nx=new Date(Math.ceil(n.getTime()/1800000)*1800000+480000);
  document.getElementById('nextUpdate').textContent=nx.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  var d=Math.max(0,Math.floor((nx-n)/1000));
  document.getElementById('countdown').textContent='('+Math.floor(d/60)+':'+('0'+(d%60)).slice(-2)+')';
  if(d===0)loadData();
  setTimeout(updateTimers,1000);
}

loadData();
setTimeout(updateTimers,200);
setInterval(loadData,60000);
window.addEventListener('resize',function(){
  if(KO_DATA&&KO_DATA.rounds){renderBracket();}
});
</script>
</body>
</html>
