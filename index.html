<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixture 2026 — Fase Eliminatoria</title>
<style>
:root{--green:#3CAC3B;--blue:#2A398D;--red:#E61D25;--lgray:#D1D4D1;--dgray:#474A4A;--bg:#eff0ed;--card:#fff;--border:#dde0dc;--text:#2a2d2d;--muted:#6b706e;--radius:14px;--radius-sm:10px;--shadow:0 2px 10px rgba(0,0,0,0.05);--shadow-h:0 4px 18px rgba(0,0,0,0.1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;overflow-x:hidden}

/* ── PAGE: FULL WIDTH ── */
.page{width:100%;max-width:100%;padding:16px 18px;margin:0 auto}

/* ── HEADER ── */
.header{text-align:center;margin-bottom:22px}
.header::after{content:'';display:block;width:60px;height:3px;background:linear-gradient(90deg,var(--red),var(--blue),var(--green));margin:12px auto 0;border-radius:2px}
.header h1{font-size:1.8rem;font-weight:900;letter-spacing:-1.5px;display:flex;align-items:center;justify-content:center;gap:8px}
.ball-icon{width:32px;height:32px;animation:spin 4s infinite linear}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
.header h1 .fixture-text{background:linear-gradient(135deg,var(--red),var(--blue),var(--green));background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:sT 3s ease-in-out infinite}
@keyframes sT{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.header .author{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,rgba(42,57,141,.08),rgba(230,29,37,.06));padding:4px 14px;border-radius:20px;font-size:.65rem;color:var(--muted);margin-bottom:5px;border:1px solid rgba(42,57,141,.12)}
.header .author a{color:var(--blue);text-decoration:none;font-weight:700;letter-spacing:-.2px}
.visor-link{display:block;width:fit-content;margin:5px auto;padding:4px 14px;background:linear-gradient(135deg,rgba(60,172,59,.12),rgba(42,57,141,.08));border:1px solid rgba(60,172,59,.25);border-radius:18px;font-size:.62rem;color:var(--green);text-decoration:none;font-weight:600}
.header .update-info{font-size:.65rem;color:var(--text);margin:5px 0}
.countdown{color:var(--blue);font-weight:700}

/* ── VERTICAL ROUNDS ── */
.rounds{display:flex;flex-direction:column;gap:16px;width:100%}

.round-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:14px 16px;box-shadow:var(--shadow);width:100%}
.round-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.round-header .rh-badge{
  font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.8px;
  color:#fff;padding:4px 10px;border-radius:6px;white-space:nowrap;
  background:var(--blue);
}
.round-header .rh-badge-final{background:linear-gradient(135deg,#c9a84c,#f5d76e,#c9a84c);color:var(--dgray)}
.round-header .rh-teams{font-size:.7rem;color:var(--muted);flex:1;text-align:right}

/* ── MATCH CARDS VERTICAL ── */
.round-matches{display:flex;flex-direction:column;gap:8px;width:100%}

.match-card{
  display:flex;align-items:center;gap:10px;
  background:var(--bg);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:10px 14px;
  transition:all .2s;position:relative;
  width:100%;
}
.match-card:hover{box-shadow:var(--shadow-h);transform:translateY(-1px);border-color:var(--lgray)}
.match-card.played{background:linear-gradient(135deg,rgba(60,172,59,.04),var(--bg))}
.match-card.live{
  background:linear-gradient(135deg,rgba(230,29,37,.04),var(--bg));
  border-color:var(--red);
  animation:livePulse 2s infinite;
}
@keyframes livePulse{0%,100%{box-shadow:0 0 0 0 rgba(230,29,37,.2)}50%{box-shadow:0 0 0 5px rgba(230,29,37,0)}}

/* Left: date + stadium */
.match-left{min-width:110px;flex-shrink:0}
.match-left .mc-date{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;display:flex;align-items:center;gap:3px}
.match-left .mc-stadium{font-size:.5rem;color:var(--muted);opacity:.6}

/* Center: teams + scores */
.match-center{flex:1;min-width:0}
.match-center .team-row{
  display:flex;align-items:center;gap:6px;
  font-size:.82rem;font-weight:600;padding:3px 0;
  border-bottom:1px solid rgba(0,0,0,.03);
}
.match-center .team-row:last-child{border-bottom:none}
.match-center .team-row .flag{font-size:1.05rem;width:22px;text-align:center;flex-shrink:0}
.match-center .team-row .name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.match-center .team-row .score{font-weight:900;font-size:.82rem;color:var(--blue);min-width:24px;text-align:center;flex-shrink:0}
.match-center .team-row.winner .name,.match-center .team-row.winner .score{color:var(--green);font-weight:800}

/* Right: stats + form pills */
.match-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;max-width:200px}
.match-right .match-stats{font-size:.52rem;color:var(--muted);display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.match-right .match-stats .stat-tag{background:rgba(42,57,141,.06);padding:1px 5px;border-radius:3px;white-space:nowrap}
.match-right .form-dots{display:flex;gap:1.5px;margin-left:auto}
.match-right .form-dots .fd{width:8px;height:8px;border-radius:2px;font-size:.4rem;display:flex;align-items:center;justify-content:center}
.match-right .form-dots .fd.w{background:rgba(60,172,59,.15);color:var(--green)}
.match-right .form-dots .fd.d{background:rgba(184,150,12,.1);color:#b8960c}
.match-right .form-dots .fd.l{background:rgba(230,29,37,.1);color:var(--red)}
.match-right .t-result-pills{display:flex;gap:2px;flex-wrap:wrap;justify-content:flex-end}
.match-right .t-result-pill{font-size:.52rem;padding:1px 5px;border-radius:3px;font-weight:600;white-space:nowrap;letter-spacing:.1px}
.match-right .t-result-pill.w{background:rgba(60,172,59,.12);color:#2a7d2b}
.match-right .t-result-pill.d{background:rgba(184,150,12,.08);color:#8a6d0b}
.match-right .t-result-pill.l{background:rgba(230,29,37,.08);color:#b8181e}
.match-right .match-extra{font-size:.48rem;color:var(--muted);font-style:italic;text-align:right}

/* ── TEAM MODAL ── */
#teamModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;align-items:center;justify-content:center;padding:12px}
#teamModal .modal-box{background:var(--card);border-radius:16px;padding:24px 20px;max-width:420px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 12px 48px rgba(0,0,0,.25);position:relative}
#teamModal .modal-close{position:absolute;top:10px;right:12px;background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--muted);padding:4px 8px;border-radius:6px}
#teamModal .t-flag{font-size:2.5rem;text-align:center;margin-bottom:4px}
#teamModal .t-name{font-size:1.2rem;font-weight:900;text-align:center;color:var(--dgray);margin-bottom:2px}
#teamModal .t-sub{font-size:.65rem;text-align:center;color:var(--muted);margin-bottom:12px}
#teamModal .t-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
#teamModal .t-stat{background:#f6f7f5;border-radius:10px;padding:8px 10px;text-align:center}
#teamModal .t-stat .val{font-size:1.1rem;font-weight:900;color:var(--blue)}
#teamModal .t-stat .lbl{font-size:.52rem;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
#teamModal .t-bar-wrap{margin:8px 0}
#teamModal .t-bar-label{display:flex;justify-content:space-between;font-size:.55rem;color:var(--muted);margin-bottom:2px}
#teamModal .t-bar{height:6px;border-radius:4px;background:var(--border);overflow:hidden}
#teamModal .t-bar-fill{height:100%;border-radius:4px;transition:width .4s ease}
#teamModal .t-results{margin-top:10px}
#teamModal .t-results h4{font-size:.65rem;color:var(--blue);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
#teamModal .t-results .t-match{display:flex;align-items:center;gap:6px;font-size:.62rem;padding:3px 0;border-bottom:1px solid rgba(0,0,0,.03)}

/* ── CHANGELOG ── */
#changelogOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center;padding:16px}

/* ── FOOTER ── */
.footer{text-align:center;margin-top:28px;padding:12px;font-size:.58rem;color:var(--muted);border-top:1px solid var(--border)}
.footer a{color:var(--blue);text-decoration:none;font-weight:600}

/* ── RESPONSIVE ── */
@media(min-width:900px){
  .page{padding:20px 28px}
  .header h1{font-size:2.2rem}
  .ball-icon{width:38px;height:38px}
  .match-card{padding:12px 18px}
}
@media(max-width:720px){
  .match-card{flex-direction:column;align-items:stretch;gap:6px}
  .match-left{min-width:unset;display:flex;gap:8px;align-items:center}
  .match-right{max-width:100%;flex-direction:row;flex-wrap:wrap;align-items:center;justify-content:flex-end}
  .match-right .t-result-pills{display:none}
  .round-card{padding:10px 12px}
}
@media(max-width:400px){
  .page{padding:10px 10px}
  .header h1{font-size:1.2rem}
  .ball-icon{width:22px;height:22px}
  .match-center .team-row{font-size:.72rem}
  .match-center .team-row .flag{font-size:.9rem;width:18px}
  .match-center .team-row .score{font-size:.72rem;min-width:20px}
  .match-left .mc-date{font-size:.5rem}
  .round-header .rh-badge{font-size:.5rem;padding:3px 7px}
}
</style>
</head>

async function loadData(){
  var d=null;
  try{var r=await fetch(API);d=await r.json()}catch(e){}
  if(!d||!d.rounds)d=DEFAULT_KO;
  KO_DATA=d;TEAMS=d.teams||{};
  document.getElementById('versionTag').textContent=formatVersion(d.updated);
  renderRounds();
}

function getFormDots(form){
  if(!form||!form.length)return '';
  return '<span class="form-dots">'+form.map(function(r){
    var cls=r==='V'?'w':r==='E'?'d':'l';
    return '<span class="fd '+cls+'">'+r+'</span>';
  }).join('')+'</span>';
}

function cleanName(name){
  if(!name)return'';
  return name.replace(/ [\u{1F1E6}-\u{1F1FF}]{2}$/u,'').trim();
}
function getTeamFlag(name){
  var cn=cleanName(name);
  var t=TEAMS[cn];
  if(t&&t.flag)return t.flag;
  var flagMap={'Sudafrica':'🇿🇦','Canada':'🇨🇦','Brasil':'🇧🇷','Japon':'🇯🇵','Alemania':'🇩🇪','Paraguay':'🇵🇾','Paises Bajos':'🇳🇱','Marruecos':'🇲🇦','Costa de Marfil':'🇨🇮','Noruega':'🇳🇴','Francia':'🇫🇷','Suecia':'🇸🇪','Mexico':'🇲🇽','Ecuador':'🇪🇨','Inglaterra':'🏴','RD Congo':'🇨🇩','Belgica':'🇧🇪','Senegal':'🇸🇳','EE.UU.':'🇺🇸','Bosnia H.':'🇧🇦','Espana':'🇪🇸','Austria':'🇦🇹','Portugal':'🇵🇹','Croacia':'🇭🇷','Suiza':'🇨🇭','Argelia':'🇩🇿','Australia':'🇦🇺','Egipto':'🇪🇬','Argentina':'🇦🇷','Cabo Verde':'🇨🇻','Colombia':'🇴','Ghana':'🇬🇭'};
  return flagMap[cn]||'🏳️';
}
function getKnockoutResults(name){
  if(!KO_DATA||!KO_DATA.rounds)return[];
  var cn=cleanName(name);
  var results=[];
  KO_DATA.rounds.forEach(function(round){
    round.matches.forEach(function(m){
      if(m.status!=='played')return;
      var hn=cleanName(m.home),an=cleanName(m.away);
      if(hn===cn||an===cn){
        var isHome=hn===cn;
        var myScore=isHome?m.hscore:m.ascore;
        var oppScore=isHome?m.ascore:m.hscore;
        var opp=isHome?m.away:m.home;
        var result=myScore>oppScore?'w':myScore<oppScore?'l':'d';
        var roundLabel=round.name.replace(' de final','').replace('avos','avos');
        results.push({score:myScore+'\u2013'+oppScore,opponent:opp,result:result,round:roundLabel,id:m.id});
      }
    });
  });
  return results;
}

function getMatchLine(name){
  var cn=cleanName(name);
  var t=TEAMS[cn];
  var pills=[];
  if(t&&t.matches_detail&&t.matches_detail.length){
    t.matches_detail.forEach(function(mt){
      var oname=mt.opponent.split(' ').slice(1).join(' ')||mt.opponent;
      if(oname.length>12)oname=oname.substring(0,10)+'\u2026';
      pills.push('<span class="t-result-pill '+mt.result+'">'+(mt.result==='w'?'⚽':mt.result==='d'?'🤝':'❌')+' '+mt.score+' '+oname+'</span>');
    });
  }
  var ko=getKnockoutResults(name);
  ko.forEach(function(k){
    var oname=k.opponent;
    if(oname.length>12)oname=oname.substring(0,10)+'\u2026';
    var icon=k.result==='w'?'⚽':k.result==='d'?'🤝':'❌';
    pills.push('<span class="t-result-pill '+k.result+'" style="border:1px solid currentColor">'+icon+' '+k.score+' '+oname+' <small style="opacity:.7">'+k.round+'</small></span>');
  });
  if(!pills.length)return '';
  return '<div class="t-result-pills">'+pills.join('')+'</div>';
}
function getTeamStats(name){
  var cn=cleanName(name);
  var t=TEAMS[cn];
  if(!t||!t.group)return '';
  var h='<span class="stat-tag">'+t.pos+' Grupo '+t.group+'</span><span class="stat-tag">'+t.pts+' pts &middot; DG '+t.dg+'</span>';
  h+=getFormDots(t.form);
  return h;
}

function renderRounds(){
  var container=document.getElementById('roundsContainer');
  container.innerHTML='';
  
  // Calculate total teams per round for the header
  KO_DATA.rounds.forEach(function(round,ri){
    var card=document.createElement('div');card.className='round-card';
    
    // Round header
    var hdr=document.createElement('div');hdr.className='round-header';
    var badge=document.createElement('span');badge.className='rh-badge'+(ri===KO_DATA.rounds.length-1?' rh-badge-final':'');
    badge.textContent=round.name;
    hdr.appendChild(badge);
    
    var teamsPlaying=0;
    round.matches.forEach(function(m){
      if(m.home.indexOf('Gan.')!==0)teamsPlaying+=2;
    });
    var info=document.createElement('span');info.className='rh-teams';
    info.textContent=round.matches.length+' partido'+(round.matches.length>1?'s':'')+(teamsPlaying?' &middot; '+teamsPlaying+' equipos':'');
    hdr.appendChild(info);
    card.appendChild(hdr);
    
    // Matches
    var m_container=document.createElement('div');m_container.className='round-matches';
    
    round.matches.forEach(function(m,mi){
      var matchEl=document.createElement('div');matchEl.className='match-card';
      if(m.status==='played')matchEl.classList.add('played');
      if(m.status==='live')matchEl.classList.add('live');
      
      var hw='',aw='';
      if(m.hscore!==null&&m.ascore!==null){
        if(m.hscore>m.ascore)hw='winner';else if(m.ascore>m.hscore)aw='winner';
      }
      var hs=m.hscore!==null?m.hscore:'-';
      var as=m.ascore!==null?m.ascore:'-';
      
      // Left: date
      var left=document.createElement('div');left.className='match-left';
      left.innerHTML='<div class="mc-date">\uD83D\uDD50 '+m.date+'</div>'+(m.stadium?'<div class="mc-stadium">'+m.stadium+'</div>':'');
      
      // Center: teams
      var center=document.createElement('div');center.className='match-center';
      var hStats='',aStats='',hMatchLine='',aMatchLine='';
      hStats=getTeamStats(m.home);aStats=getTeamStats(m.away);
      hMatchLine=getMatchLine(m.home);aMatchLine=getMatchLine(m.away);
      var hFlag=getTeamFlag(m.home),aFlag=getTeamFlag(m.away);
      var hName=m.home,aName=m.away;
      
      var hClick='',aClick='';
      if(m.home.indexOf('Gan.')!==0){hFlag=getTeamFlag(m.home);hName=m.home;hClick=' onclick="showTeamProfile(\''+m.home.replace(/'/g,"\\'")+'\')"'}
      else{hFlag='🏆';hName=m.home}
      if(m.away.indexOf('Gan.')!==0){aFlag=getTeamFlag(m.away);aName=m.away;aClick=' onclick="showTeamProfile(\''+m.away.replace(/'/g,"\\'")+'\')"'}
      else{aFlag='🏆';aName=m.away}
      
      center.innerHTML='<div class="team-row '+hw+'"><span class="flag">'+hFlag+'</span><span class="name"'+hClick+'>'+hName+'</span><span class="score">'+hs+'</span></div>'+
        '<div class="team-row '+aw+'"><span class="flag">'+aFlag+'</span><span class="name"'+aClick+'>'+aName+'</span><span class="score">'+as+'</span></div>';
      
      // Right: stats + extra
      var right=document.createElement('div');right.className='match-right';
      right.innerHTML='<div class="match-stats">'+hStats+'</div>'+hMatchLine+
        (m.extra?'<div class="match-extra">'+m.extra+'</div>':'');
      
      matchEl.appendChild(left);
      matchEl.appendChild(center);
      matchEl.appendChild(right);
      m_container.appendChild(matchEl);
    });
    
    card.appendChild(m_container);
    container.appendChild(card);
  });
}

function updateTimers(){
  var n=new Date(),nx=new Date(Math.ceil(n.getTime()/1800000)*1800000+480000);
  document.getElementById('nextUpdate').textContent=nx.toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'numeric'})+' '+nx.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})+' ARG';
  var d=Math.max(0,Math.floor((nx-n)/1000));
  document.getElementById('countdown').textContent='(en '+Math.floor(d/60)+':'+('0'+(d%60)).slice(-2)+')';
  if(d===0)location.reload(true);else setTimeout(updateTimers,1000);
}

function formatVersion(iso){
  if(!iso||iso==='?')return 'v'+VERSION_COUNT+' &middot; sin datos';
  try{var d=new Date(iso);var m=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];return 'v'+VERSION_COUNT+' &middot; ultima modificacion: '+d.getDate()+' '+m[d.getMonth()]+' '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)}catch(e){return 'v'+VERSION_COUNT+' &middot; '+iso}
}

function showTeamProfile(name){
  var cn=cleanName(name);
  var t=TEAMS[cn];
  if(!t){alert('Sin datos de '+name);return}
  var flag=t.flag||getTeamFlag(name);
  var rating=t.rating||50;
  var barColor=rating>=80?'var(--green)':rating>=60?'var(--blue)':rating>=40?'#f0a500':'var(--red)';
  var formDots=getFormDots(t.form||[]);
  var fifaRank=t.fifa_rank||'?';
  var best=t.best||'?';
  var apps=t.apps||'?';
  var conf=t.conf||'?';
  var h='<div class="t-flag">'+flag+'</div><div class="t-name">'+name+'</div><div class="t-sub">'+conf+' &middot; Ranking FIFA: #'+fifaRank+' &middot; '+apps+' Mundial</div>';
  h+='<div class="t-grid"><div class="t-stat"><div class="val">'+t.pts+'</div><div class="lbl">Puntos</div></div><div class="t-stat"><div class="val">'+t.dg+'</div><div class="lbl">Dif. Gol</div></div><div class="t-stat"><div class="val">'+t.pos+'</div><div class="lbl">Grupo '+t.group+'</div></div><div class="t-stat"><div class="val">'+t.played+' PJ</div><div class="lbl">Partidos</div></div></div>';
  h+='<div class="t-bar-wrap"><div class="t-bar-label"><span>Calidad general</span><span>'+rating+'/100</span></div><div class="t-bar"><div class="t-bar-fill" style="width:'+rating+'%;background:'+barColor+'"></div></div></div>';
  h+='<div class="t-grid" style="grid-template-columns:1fr 1fr 1fr"><div class="t-stat"><div class="val" style="font-size:.85rem">'+t.attack+'</div><div class="lbl">Ataque</div></div><div class="t-stat"><div class="val" style="font-size:.85rem">'+t.defense+'</div><div class="lbl">Defensa</div></div><div class="t-stat"><div class="val" style="font-size:.85rem">'+t.keeper+'</div><div class="lbl">Arquero</div></div></div>';
  h+='<div style="font-size:.6rem;color:var(--muted)">Forma: '+formDots+'</div>';
  h+='<div style="font-size:.6rem;color:var(--muted);margin-top:2px">Mejor historico: '+best+'</div>';
  var matches=t.matches_detail||[];
  if(matches.length){
    h+='<div class="t-results"><h4>Fase de grupos</h4>';
    matches.forEach(function(mt){
      var ri=mt.result==='w'?'⚽':mt.result==='d'?'🤝':'❌';
      h+='<div class="t-match"><span>'+ri+'</span><span>'+mt.score+' vs '+mt.opponent+'</span></div>';
    });
    h+='</div>';
  }
  var koMatches=getKnockoutResults(name);
  if(koMatches.length){
    h+='<div class="t-results"><h4>Eliminatorias</h4>';
    koMatches.forEach(function(k){
      var ri=k.result==='w'?'⚽':k.result==='d'?'🤝':'❌';
      h+='<div class="t-match"><span>'+ri+'</span><span>'+k.score+' vs '+k.opponent+' <small style="opacity:.6">('+k.round+')</small></span></div>';
    });
    h+='</div>';
  }
  document.getElementById('teamModalContent').innerHTML=h;
  document.getElementById('teamModal').style.display='flex';
}
function closeTeamModal(){document.getElementById('teamModal').style.display='none'}

function toggleChangelog(){
  var ov=document.getElementById('changelogOverlay');
  if(ov.style.display==='flex'){ov.style.display='none';return}
  document.getElementById('changelogContent').innerHTML=CHANGELOG.map(function(e){
    return '<div style="margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border);font-size:.68rem;line-height:1.4"><strong style="color:var(--blue)">v'+e.v+'</strong> <span style="color:var(--muted);font-size:.58rem">'+e.date+'</span><br>'+e.text+'</div>';
  }).join('');
  ov.style.display='flex';
}
