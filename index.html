  :root {

    --blue:   #2A398D;
    --red:    #E61D25;
    --lgray:  #D1D4D1;
    --dgray:  #474A4A;
    --bg:     #f2f3f1;
    --card:   #ffffff;
    --border: #dde0dc;
    --text:   #2d3030;
    --muted:  #6e7271;
    --radius: 16px;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);

  /* ═══════════ FONDO SVG MUNDIAL 2026 ═══════════ */

    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }

  .page { position: relative; z-index: 1; padding: 24px 20px; }

  .header {

    margin-bottom: 32px;
    position: relative;

  .header::after {
    content: '';
    display: block;
    width: 60px; height: 4px;
    background: linear-gradient(90deg, var(--red), var(--blue));
    margin: 20px auto 0;
    border-radius: 2px;
  }
  .header h1 {
    font-size: 2.8rem; font-weight: 900; letter-spacing: -2px;
    color: var(--dgray); margin-bottom: 4px;
  }
  .header h1 .icon { display: inline-block; animation: bounce 2s infinite; }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .header h1 span {
    background: linear-gradient(135deg, var(--red), var(--blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header .author { font-size: 0.85rem; color: var(--muted); margin-bottom: 4px; }
  .header .author a { color: var(--blue); text-decoration: none; font-weight: 600; }
  .header .author a:hover { text-decoration: underline; }
  .header .update-info {
    font-size: 0.72rem; color: var(--muted); margin-bottom: 16px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .update-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    display: inline-block;
    box-shadow: 0 0 6px rgba(60,172,59,0.4);
  }
  .btn-refresh {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 13px 40px;
    background: linear-gradient(135deg, var(--red), #c41920);
    color: #fff; border: none;
    border-radius: 30px; font-size: 0.95rem; font-weight: 700; cursor: pointer;
    transition: all 0.25s; font-family: inherit; letter-spacing: -0.2px;
    box-shadow: 0 4px 24px rgba(230,29,37,0.25);
    position: relative; overflow: hidden;
  }
  .btn-refresh::after {
    content: '';
    position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    transition: left 0.5s;
  }
  .btn-refresh:hover::after { left: 100%; }
  .btn-refresh:hover { transform: translateY(-1px); box-shadow: 0 6px 30px rgba(230,29,37,0.35); }
  .btn-refresh:active { transform: scale(0.97); }

  /* ═══════════ PARTIDOS DE HOY ═══════════ */
  .today-matches {
    max-width: 960px; margin: 0 auto 32px auto;
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px 24px;
    box-shadow: var(--shadow);
  }
  .today-matches h3 {
    font-size: 0.82rem; color: var(--blue); text-transform: uppercase;
    letter-spacing: 0.6px; margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
    font-weight: 700;
  }
  .today-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 10px; }
  .today-match {
    display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px;
    background: #f6f7f5; border-radius: 12px; border: 1px solid var(--border);
    font-size: 0.8rem; transition: all 0.2s;
  }
  .today-match:hover { background: #eef0ec; border-color: #c8ccc6; }
  .today-match .group-tag {
    font-size: 0.62rem; background: var(--blue); color: #fff;
    padding: 3px 8px; border-radius: 5px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.4px;
  }
  .today-match .teams { font-weight: 600; color: var(--text); }
  .today-match .score {
    font-weight: 800; font-size: 0.88rem; color: var(--red);
    margin: 0 6px; min-width: 30px; text-align: center;
  }
  .today-match .pending-tag {
    font-size: 0.62rem; color: var(--blue); white-space: nowrap;
    background: rgba(42,57,141,0.06); padding: 2px 8px; border-radius: 4px;
  }

  /* ═══════════ LEGEND ═══════════ */
  .legend { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 28px; font-size: 0.78rem; }
  .legend-item {
    display: flex; align-items: center; gap: 8px; background: var(--card);
    padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border);
    box-shadow: 0 1px 4px rgba(0,0,0,0.03); transition: transform 0.15s;
  }
  .legend-item:hover { transform: translateY(-1px); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

  /* ═══════════ GROUPS GRID ═══════════ */
  .groups-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
    gap: 18px; max-width: 1640px; margin: 0 auto;
  }

  /* ═══════════ GROUP CARD ═══════════ */
  .group-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
    position: relative; overflow: hidden;
    box-shadow: var(--shadow);
    transition: box-shadow 0.2s, transform 0.15s;
  }
  .group-card:hover {
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    transform: translateY(-1px);
  }
  .group-card::before {
    content: '';
    position: absolute; top: -40px; right: -40px;
    width: 140px; height: 140px;
    background: radial-gradient(circle, rgba(42,57,141,0.04) 0%, transparent 70%);
    border-radius: 50%; pointer-events: none;

  .group-card h2 {
    font-size: 1rem; color: var(--blue); margin-bottom: 14px; padding-bottom: 10px;
    border-bottom: 2px solid var(--border); display: flex; align-items: center; gap: 8px;

  .group-card h2 .badge {
    font-size: 0.62rem; color: var(--muted); font-weight: 600; margin-left: auto;
    background: #f2f3f1; padding: 3px 10px; border-radius: 8px;
    border: 1px solid var(--border);

  .standings-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  .standings-table th {
    text-align: left; color: var(--muted); font-weight: 700;
    font-size: 0.64rem; text-transform: uppercase; letter-spacing: 0.7px;

    background: #f8f9f7;

    font-size: 0.82rem;

  .standings-table td.team-cell .flag { font-size: 1.2rem; }
  .standings-table td.num { text-align: center; font-weight: 800; font-size: 0.92rem; }

    font-size: 0.63rem; font-weight: 700; white-space: nowrap;

  .team-detail .win  { color: var(--green); font-weight: 500; }
  .team-detail .draw { color: #b8960c; font-weight: 500; }
  .team-detail .loss { color: var(--red); font-weight: 500; }
  .team-detail .pending { color: var(--blue); font-weight: 500; }
  .team-detail .requirement {
    color: var(--dgray); font-weight: 600; margin-top: 4px;
    font-size: 0.69rem;

  .group-reqs {
    margin-top: 16px; padding: 14px 16px;
    background: linear-gradient(135deg, #f6f7f5, #f0f2ee);
    border-radius: 12px; border-left: 4px solid var(--blue);

  .group-reqs .req-complicado { color: var(--red); }
  .group-reqs .req-elim { color: var(--muted); }

  /* ═══════════ FOOTER ═══════════ */
  .footer {
    text-align: center; margin-top: 40px; padding: 20px;
    font-size: 0.68rem; color: var(--muted);
    border-top: 1px solid var(--border);
  }
  .footer a { color: var(--blue); text-decoration: none; font-weight: 600; }
  .footer a:hover { text-decoration: underline; }

  /* ═══════════ RESPONSIVE ═══════════ */
  @media (max-width: 520px) {
    .groups-grid { grid-template-columns: 1fr; }
    .header h1 { font-size: 2rem; }
    .page { padding: 12px 8px; }
    .today-grid { grid-template-columns: 1fr; }
    .group-card { padding: 14px; }
  }
</style>
</head>
