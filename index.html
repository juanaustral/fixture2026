<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixture 2026 — Fase Eliminatoria</title>
<style>
:root{
  --green:#3CAC3B;--blue:#2A398D;--red:#E61D25;
  --lgray:#D1D4D1;--dgray:#474A4A;
  --bg:#f2f3f0;--card:#fff;--border:#e2e4e0;--text:#1d1f1d;--muted:#6b706e;
  --radius:10px;--shadow:0 1px 4px rgba(0,0,0,.06);
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --col-w:200px;--row-h:auto;--slot-gap:2px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;font-size:14px;line-height:1.3;
}

/* ── HEADER ── */
.header{
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:8px 14px;flex-shrink:0;border-bottom:1px solid var(--border);
  background:var(--bg);flex-wrap:wrap;
}
.header h1{
  font-size:1.05rem;font-weight:800;letter-spacing:-.5px;
  background:linear-gradient(135deg,var(--red),var(--blue),var(--green));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;white-space:nowrap;
}
.header .meta{display:flex;align-items:center;gap:8px;font-size:.55rem;color:var(--muted);flex-wrap:wrap}
.header .meta .countdown{color:var(--blue);font-weight:600}
.header .visor-link{
  font-size:.52rem;color:var(--green);text-decoration:none;font-weight:600;
  padding:2px 8px;border:1px solid rgba(60,172,59,.25);border-radius:12px;white-space:nowrap;
}
.header .version-link{font-size:.48rem;color:var(--muted);text-decoration:none;border-bottom:1px dotted var(--muted);white-space:nowrap}

/* ── BRACKET ── */
.bracket-wrap{flex:1;overflow:auto;min-height:0;padding:0}
.bracket{
  display:grid;
  gap:0;
  min-width:calc(var(--col-w)*5 + 40px);
  padding:8px 6px 30px;
}
/* Round titles are placed as grid items spanning the whole column */
.rt{
  font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
  color:#fff;text-align:center;padding:4px 6px;background:var(--blue);
  border-radius:var(--radius);margin:0 2px 2px;z-index:5;
}
.last-rt{background:linear-gradient(135deg,#c9a84c,#f5d76e,#c9a84c);color:var(--dgray)}

/* ── MATCH CARD ── */
.mc{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:5px 7px;cursor:pointer;transition:all .12s;
  display:flex;flex-direction:column;gap:0;
  position:relative;z-index:2;
  margin:1px 2px;
}
.mc:hover{border-color:var(--blue);box-shadow:0 2px 10px rgba(42,57,141,.15);z-index:10}
.mc.played{
  background:linear-gradient(135deg,rgba(60,172,59,.04),var(--card));
  border-color:rgba(60,172,59,.25);
}
.mc.live{border-color:var(--red);animation:lp 2s infinite}
@keyframes lp{0%,100%{box-shadow:0 0 0 0 rgba(230,29,37,.12)}50%{box-shadow:0 0 0 5px rgba(230,29,37,0)}}

.mc .mr{display:flex;align-items:center;gap:3px;padding:1px 0}
.mc .mr .fl{font-size:.75rem;flex-shrink:0;line-height:1;width:18px;text-align:center}
.mc .mr .nm{
  font-size:.62rem;font-weight:600;flex:1;min-width:0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.mc .mr .sc{
  font-size:.62rem;font-weight:800;color:var(--blue);text-align:right;
  flex-shrink:0;min-width:16px;
}
.mc .mr.wn .nm,.mc .mr.wn .sc{color:var(--green)}

.mc .sr{display:flex;align-items:center;gap:3px;padding:0 0 0 18px;min-height:0}
.mc .sr .st{
  font-size:.46rem;color:var(--muted);background:rgba(42,57,141,.04);
  padding:0 4px;border-radius:3px;line-height:1.4;white-space:nowrap;
}
.mc .sr .fd{display:flex;gap:1px}
.mc .sr .fd i{display:block;width:6px;height:6px;border-radius:1px}
.mc .sr .fd i.w{background:rgba(60,172,59,.25)}
.mc .sr .fd i.d{background:rgba(184,150,12,.15)}
.mc .sr .fd i.l{background:rgba(230,29,37,.15)}

.mc .mf{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:1px;padding-top:1px;border-top:1px solid var(--border);
}
.mc .mf .md{font-size:.44rem;color:var(--muted)}
.mc .mf .mx{font-size:.42rem;color:var(--muted);font-style:italic}

/* Future rounds: simpler */
.round-1 .mc .sr{display:none}

/* ── SVG CONNECTORS ── */
#lines{grid-column:1/-1;grid-row:1/-1;pointer-events:none;z-index:1;position:relative;width:100%;height:100%}

/* ── MODAL ── */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:100;align-items:center;justify-content:center;padding:12px}
#modal .bx{background:var(--card);border-radius:14px;padding:20px;max-width:380px;width:100%;max-height:80vh;overflow-y:auto;position:relative;box-shadow:0 8px 40px rgba(0,0,0,.18)}
#modal .cl{position:absolute;top:8px;right:10px;background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--muted);padding:2px 6px;border-radius:4px}
#modal .cl:hover{background:rgba(0,0,0,.06)}
#modal .mhd{font-size:.55rem;color:var(--muted);margin-bottom:8px;text-align:center}
#modal .tr{display:flex;align-items:center;gap:8px;padding:5px 0;cursor:pointer;border-radius:6px;transition:background .1s}
#modal .tr:hover{background:rgba(42,57,141,.04)}
#modal .tr .tf{font-size:1.3rem;flex-shrink:0;width:28px;text-align:center}
#modal .tr .tn{font-size:.8rem;font-weight:700;flex:1}
#modal .tr .ts{font-size:.8rem;font-weight:800;color:var(--blue);flex-shrink:0}
#modal .tr.wn .ts{color:var(--green)}
#modal .td{font-size:.48rem;color:var(--muted);margin:-1px 0 3px 36px}
#modal .ex{font-size:.55rem;color:var(--muted);font-style:italic;text-align:center;margin:6px 0}
#modal .sc{margin-top:10px}
#modal .sc h4{font-size:.55rem;color:var(--blue);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
#modal .sc .rw{display:flex;align-items:center;gap:5px;font-size:.54rem;padding:2px 0;border-bottom:1px solid rgba(0,0,0,.03)}

/* ── CHANGELOG ── */
#ch{display:none;position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:99;align-items:center;justify-content:center;padding:12px}
#ch .bxc{background:var(--card);border-radius:14px;padding:20px;max-width:380px;width:100%;max-height:70vh;overflow-y:auto}
#ch .en{margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid var(--border);font-size:.6rem;line-height:1.4}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  :root{--col-w:175px}
  .header{gap:5px;padding:5px 8px}
  .header h1{font-size:.82rem}
  .mc{padding:4px 5px}
  .mc .mr .nm{font-size:.58rem}
  .mc .mr .sc{font-size:.58rem}
}
</style>
</head>
<body>

<div class="header">
  <h1>Fixture 2026</h1>
  <div class="meta">
    <span>Prox: <strong id="nextUpdate">-</strong> <span class="countdown" id="countdown"></span></span>
    <a href="https://juanaustral.github.io/visormundial/" class="visor-link" target="_blank">Ver en vivo</a>
    <a href="#" onclick="tc();return false" class="version-link" id="versionTag">--</a>
  </div>
</div>

<div class="bracket-wrap">
  <div class="bracket" id="bracket">
    <svg id="lines"></svg>
  </div>
</div>

<div id="modal" onclick="if(event.target===this)cm()"></div>
<div id="ch" onclick="if(event.target===this)this.style.display='none'"><div class="bxc" id="chBody"></div></div>

<script>
var API='https://raw.githubusercontent.com/juanaustral/fixture2026/main/data_ko.json';
var D=null,T={};
var VC=31;
var CL=[
  {v:31,date:'4 jul',text:'Rediseno: bracket con CSS Grid unico, sin superposiciones, conectores SVG precisos.'},
  {v:30,date:'4 jul',text:'Rediseno con lineas SVG y datos por equipo.'},
  {v:29,date:'4 jul',text:'Rediseno bracket compacto.'},
  {v:28,date:'4 jul',text:'Marruecos 3-0 Canada. Marruecos avanza a cuartos.'},
  {v:27,date:'4 jul',text:'Octavos: horarios y estadios.'},
  {v:26,date:'3 jul',text:'Suiza 2-0 Argelia (16avos completado).'},
  {v:25,date:'2 jul',text:'EN VIVO: Espana vs Austria, Portugal vs Croacia.'},
  {v:24,date:'2 jul',text:'16avos: cruces de octavos confirmados.'},
  {v:23,date:'1 jul',text:'USA 2-0 Bosnia. USA avanza a octavos.'},
  {v:22,date:'30 jun',text:'Francia 3-0 Suecia.'},
];

function ld(){
  fetch(API).then(function(r){return r.json()}).then(function(d){
    D=d;T=d.teams||{};
    document.getElementById('versionTag').textContent=fv(d.updated);
    rb();
  }).catch(function(){D={teams:{},rounds:[]};rb();});
}

function cn(n){if(!n)return'';return n.replace(/ [\u{1F1E6}-\u{1F1FF}]{2}$/u,'').trim()}

function tf(n){
  var c=cn(n),t=T[c];
  if(t&&t.flag)return t.flag;
  var m={
    'Sudafrica':'🇿🇦','Canada':'🇨🇦','Brasil':'🇧🇷','Japon':'🇯🇵','Alemania':'🇩🇪',
    'Paraguay':'🇵🇾','Paises Bajos':'🇳🇱','Marruecos':'🇲🇦','Costa de Marfil':'🇨🇮',
    'Noruega':'🇳🇴','Francia':'🇫🇷','Suecia':'🇸🇪','Mexico':'🇲🇽','Ecuador':'🇪🇨',
    'Inglaterra':'🏴','RD Congo':'🇨🇩','Belgica':'🇧🇪','Senegal':'🇸🇳','EE.UU.':'🇺🇸',
    'Bosnia H.':'🇧🇦','Espana':'🇪🇸','Austria':'🇦🇹','Portugal':'🇵🇹','Croacia':'🇭🇷',
    'Suiza':'🇨🇭','Argelia':'🇩🇿','Australia':'🇦🇺','Egipto':'🇪🇬','Argentina':'🇦🇷',
    'Cabo Verde':'🇨🇻','Colombia':'🇨🇴','Ghana':'🇬🇭'
  };
  return m[c]||'🏳️';
}

function ts(n){
  var c=cn(n),t=T[c];
  if(!t||!t.group||n.indexOf('Gan.')===0)return'';
  var h='<span class="st">'+t.pos+' Gr '+t.group+'</span><span class="st">'+t.pts+' pts</span>';
  if(t.form&&t.form.length){
    h+='<span class="fd">'+t.form.map(function(r){var cl=r==='V'?'w':r==='E'?'d':'l';return'<i class="'+cl+'"></i>';}).join('')+'</span>';
  }
  return h;
}

function gk(n){
  var c=cn(n),r=[];
  if(!D||!D.rounds)return r;
  D.rounds.forEach(function(rd){
    rd.matches.forEach(function(m){
      if(m.status!=='played')return;
      var hn=cn(m.home),an=cn(m.away);
      if(hn!==c&&an!==c)return;
      var ih=hn===c;
      r.push({
        s:(ih?m.hscore:m.ascore)+'\u2013'+(ih?m.ascore:m.hscore),
        o:ih?m.away:m.home,
        r:(ih?m.hscore:m.ascore)>(ih?m.ascore:m.hscore)?'w':
          (ih?m.hscore:m.ascore)<(ih?m.ascore:m.hscore)?'l':'d',
        lb:rd.name.replace(' de final','')
      });
    });
  });
  return r;
}

function rb(){
  var b=document.getElementById('bracket');
  var svg=document.getElementById('lines');
  var rds=D.rounds;
  if(!rds||!rds.length)return;

  b.innerHTML='';
  b.appendChild(svg);
  svg.innerHTML='';

  var numR=rds.length;      // 5 rounds
  var maxM=rds[0].matches.length; // 16 matches in first round
  var totalRows=maxM*2;     // 32 rows for the bracket

  // Set up the CSS grid: 5 columns for rounds + 32 rows
  b.style.gridTemplateColumns='repeat('+numR+',var(--col-w))';
  b.style.gridTemplateRows='auto repeat('+totalRows+',1fr)';

  // Add round titles
  rds.forEach(function(rd,ri){
    var ttl=document.createElement('div');
    ttl.className='rt'+(ri===numR-1?' last-rt':'');
    ttl.textContent=rd.name;
    ttl.style.gridColumn=(ri+1)+'/'+(ri+2);
    ttl.style.gridRow='1';
    b.appendChild(ttl);
  });

  // Place matches in the grid
  // Round 0 (16avos): each match spans 2 rows. Match mi at rows 1+mi*2+1 / span 2
  // Round 1 (octavos): each match spans 4 rows. Match mi at rows 1+mi*4+2 / span 4
  // Round 2 (cuartos): each match spans 8 rows. Match mi at rows 1+mi*8+4 / span 8
  // etc.
  // General: round ri, match mi: startRow = 1 + mi * (totalRows/2^ri) + (totalRows/2^(ri+1))
  //                                    = 1 + mi * stride*2 + stride
  // where stride = totalRows / 2^(ri+2)  -- but that's not right either

  // Simpler: totalRows = 32 (for 16 matches in round 0)
  // Round 0 (16 matches, each gets 2 rows): match mi at row 2+mi*2, span 2
  // Round 1 (8 matches, each gets 4 rows): match mi at row 2+mi*4, span 4
  // Round 2 (4 matches, each gets 8 rows): match mi at row 2+mi*8, span 8
  // Wait, but we want:
  // R16 match 0 centered between R32 match 0 and R32 match 1
  // R32 match 0: rows 2-3 ; R32 match 1: rows 4-5
  // Their average center is at row 3.5, so R16 match 0 should span from row 2.5 to row 5.5
  // In CSS Grid, rows are integers. So use row 2 / span 4 for R16 match 0:
  // This spans rows 2,3,4,5 - centered between R32 match 0 (rows 2-3) and R32 match 1 (rows 4-5)
  // Yes! Mi=0: start=2, span=4 ✓
  // Mi=1: start=6, span=4 ✓ (centered between R32 match 2 at rows 6-7 and match 3 at rows 8-9)

  // For quarterfinals (R2):
  // QF match 0 connects R16 match 0 and R16 match 1
  // R16 match 0: rows 2-5 (avg 3.5); R16 match 1: rows 6-9 (avg 7.5)
  // QF match 0 should span from 2 to 9 → start=2, span=8
  // Mi=0: start=2, span=8 ✓
  // Mi=1: start=10, span=8 ✓

  // For semifinals (R3):
  // SF match 0 connects QF match 0 and QF match 1
  // QF match 0: rows 2-9; QF match 1: rows 10-17
  // SF match 0 should span 2-17 → start=2, span=16
  // Mi=0: start=2, span=16 ✓

  // For final (R4):
  // Final connects SF match 0 and SF match 1 (but there's only 1 match)
  // Final should span 2-33 → start=2, span=32

  // General formula:
  var matchStarts=[]; // for each round, the start row of match 0

  rds.forEach(function(rd,ri){
    var n=rd.matches.length;
    // Start row for match 0 in this round
    var start0=2;
    var span=totalRows/n;    // Each match spans totalRows/n rows
    var col=ri+1;            // Column number (1-indexed)

    rd.matches.forEach(function(m,mi){
      // Grid row: match mi starts at row start0 + mi*span
      var start=start0+mi*span;
      var end=start+span-1;
      // Clamp to grid bounds
      if(end>totalRows+1)end=totalRows+1;

      var crd=document.createElement('div');
      crd.className='mc round-'+ri+
        (m.status==='played'?' played':'')+
        (m.status==='live'?' live':'');
      crd.style.gridColumn=col+'/'+(col+1);
      crd.style.gridRow=start+'/'+(start+span);

      var hw='',aw='';
      if(m.hscore!==null&&m.ascore!==null){
        if(m.hscore>m.ascore)hw='wn';else if(m.ascore>m.hscore)aw='wn';
      }
      var hs=m.hscore!==null?m.hscore:'-',as=m.ascore!==null?m.ascore:'-';
      var hf=m.home.indexOf('Gan.')===0?'🏆':tf(m.home);
      var af=m.away.indexOf('Gan.')===0?'🏆':tf(m.away);
      var hSt=ri<2?ts(m.home):'',aSt=ri<2?ts(m.away):'';

      crd.innerHTML=
        '<div class="mr '+hw+'"><span class="fl">'+hf+'</span><span class="nm">'+m.home+'</span><span class="sc">'+hs+'</span></div>'+
        (hSt?'<div class="sr">'+hSt+'</div>':'')+
        '<div class="mr '+aw+'"><span class="fl">'+af+'</span><span class="nm">'+m.away+'</span><span class="sc">'+as+'</span></div>'+
        (aSt?'<div class="sr">'+aSt+'</div>':'')+
        '<div class="mf"><span class="md">'+m.date+(m.stadium?' &middot; '+m.stadium:'')+'</span>'+
        (m.extra?'<span class="mx">'+m.extra+'</span>':'')+'</div>';

      crd.addEventListener('click',function(e){e.stopPropagation();sm(m);});
      b.appendChild(crd);
    });
  });

  // Draw connectors
  requestAnimationFrame(function(){dl(rds);});
  setTimeout(function(){dl(rds);},300);
}

function dl(rds){
  var svg=document.getElementById('lines');
  var b=document.getElementById('bracket');
  if(!svg||!b)return;

  var bw=b.offsetWidth,bh=b.offsetHeight;
  if(!bw||!bh)return;
  svg.setAttribute('viewBox','0 0 '+bw+' '+bh);
  svg.innerHTML='';

  var ns='http://www.w3.org/2000/svg';
  var cols={};

  // Collect match cards per round
  var allCards=b.querySelectorAll('.mc');
  allCards.forEach(function(crd){
    // Determine round from grid-column style
    var gcs=crd.style.gridColumn;
    var col=parseInt(gcs);
    if(!cols[col])cols[col]=[];
    cols[col].push(crd);
  });

  var br=b.getBoundingClientRect();

  function addPath(pts,pl){
    var p=document.createElementNS(ns,'path');
    var d='M '+pts[0][0]+' '+pts[0][1];
    for(var i=1;i<pts.length;i++)d+=' L '+pts[i][0]+' '+pts[i][1];
    p.setAttribute('d',d);
    p.setAttribute('fill','none');
    p.setAttribute('stroke',pl?'var(--green)':'var(--lgray)');
    p.setAttribute('stroke-width',pl?'2':'1.5');
    p.setAttribute('stroke-linecap','round');
    p.setAttribute('stroke-linejoin','round');
    if(!pl)p.setAttribute('stroke-dasharray','4,3');
    svg.appendChild(p);
  }

  function gc(ri,mi){
    var col=ri+1;
    var cards=cols[col];
    if(!cards||!cards[mi])return null;
    var cr=cards[mi].getBoundingClientRect();
    return {
      right:(cr.right-br.left)/bw*bw,
      left:(cr.left-br.left)/bw*bw,
      centerY:((cr.top+cr.bottom)/2-br.top)/bh*bh
    };
  }

  for(var ri=0;ri<rds.length-1;ri++){
    var n=rds[ri].matches.length;
    var colW=bw/rds.length;
    for(var mi=0;mi<n;mi++){
      var src=gc(ri,mi);
      var dst=gc(ri+1,Math.floor(mi/2));
      if(!src||!dst)continue;

      var m=rds[ri].matches[mi];
      var pl=m&&m.status==='played';
      var hEnd=Math.min(src.right+colW*0.2,dst.left-20);

      addPath([
        [src.right,src.centerY],
        [hEnd,src.centerY],
        [hEnd,dst.centerY],
        [dst.left,dst.centerY]
      ], pl);
    }
  }
}

function sm(m){
  if(!m)return;
  var el=document.getElementById('modal');
  var h='<div class="bx"><button class="cl" onclick="cm()">&#10005;</button>';

  h+='<div class="mhd">'+m.date+(m.stadium?' &middot; '+m.stadium:'')+'</div>';

  function addT(n,s,wn){
    if(n.indexOf('Gan.')===0){
      h+='<div class="tr"><span class="tf">🏆</span><span class="tn">'+n+'</span></div>';
      return;
    }
    var c=cn(n),t=T[c];
    var f=t&&t.flag?t.flag:tf(n);
    h+='<div class="tr'+(wn?' wn':'')+'" onclick="stp(\''+n.replace(/'/g,"\\'")+'\')">';
    h+='<span class="tf">'+f+'</span><span class="tn">'+n+'</span><span class="ts">'+s+'</span></div>';
    if(t&&t.group)h+='<div class="td">'+t.pos+' Grupo '+t.group+' &middot; '+t.pts+' pts &middot; DG '+t.dg+' &middot; FIFA #'+(t.fifa_rank||'?')+'</div>';
  }

  addT(m.home,m.hscore!==null?m.hscore:'-',m.hscore!==null&&m.ascore!==null&&m.hscore>m.ascore);
  addT(m.away,m.ascore!==null?m.ascore:'-',m.hscore!==null&&m.ascore!==null&&m.ascore>m.hscore);
  if(m.extra)h+='<div class="ex">'+m.extra+'</div>';

  [m.home,m.away].forEach(function(tn){
    if(tn.indexOf('Gan.')===0)return;
    var ko=gk(tn);
    if(ko.length){
      h+='<div class="sc"><h4>'+cn(tn)+' — Eliminatorias</h4>';
      ko.forEach(function(k){h+='<div class="rw"><span>'+(k.r==='w'?'&#9917;':k.r==='d'?'&#129309;':'&#10060;')+'</span><span>'+k.s+' vs '+k.o+' <small style="opacity:.6">('+k.lb+')</small></span></div>';});
      h+='</div>';
    }
  });

  h+='</div>';
  el.innerHTML=h;
  el.style.display='flex';
}
function cm(){document.getElementById('modal').style.display='none'}

function stp(n){
  cm();
  var c=cn(n),t=T[c];
  if(!t)return;
  var el=document.getElementById('modal');
  var bc=t.rating>=80?'var(--green)':t.rating>=60?'var(--blue)':t.rating>=40?'#f0a500':'var(--red)';
  var fd='<span style="display:flex;gap:2px">'+(t.form||[]).map(function(r){
    var cl=r==='V'?'var(--green)':r==='E'?'#b8960c':'var(--red)';
    return'<span style="width:8px;height:8px;border-radius:2px;background:'+cl+'"></span>';
  }).join('')+'</span>';

  var h='<div class="bx"><button class="cl" onclick="cm()">&#10005;</button>';
  h+='<div style="font-size:1.8rem;text-align:center">'+(t.flag||tf(n))+'</div>';
  h+='<div style="font-size:.95rem;font-weight:800;text-align:center;color:var(--text)">'+n+'</div>';
  h+='<div style="font-size:.55rem;text-align:center;color:var(--muted);margin-bottom:10px">'+t.conf+' &middot; FIFA #'+(t.fifa_rank||'?')+' &middot; '+(t.apps||'?')+' Mundial &middot; Mejor: '+(t.best||'?')+'</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:8px">';
  h+='<div style="background:#f6f7f5;border-radius:8px;padding:6px 8px;text-align:center"><div style="font-size:.85rem;font-weight:800;color:var(--blue)">'+t.pts+'</div><div style="font-size:.45rem;color:var(--muted);text-transform:uppercase;letter-spacing:.3px">Puntos</div></div>';
  h+='<div style="background:#f6f7f5;border-radius:8px;padding:6px 8px;text-align:center"><div style="font-size:.85rem;font-weight:800;color:var(--blue)">'+t.dg+'</div><div style="font-size:.45rem;color:var(--muted);text-transform:uppercase;letter-spacing:.3px">Dif. Gol</div></div>';
  h+='<div style="background:#f6f7f5;border-radius:8px;padding:6px 8px;text-align:center"><div style="font-size:.85rem;font-weight:800;color:var(--blue)">'+t.pos+'</div><div style="font-size:.45rem;color:var(--muted);text-transform:uppercase;letter-spacing:.3px">Gr '+t.group+'</div></div>';
  h+='<div style="background:#f6f7f5;border-radius:8px;padding:6px 8px;text-align:center"><div style="font-size:.85rem;font-weight:800;color:var(--blue)">'+t.played+' PJ</div><div style="font-size:.45rem;color:var(--muted);text-transform:uppercase;letter-spacing:.3px">Partidos</div></div>';
  h+='</div>';
  h+='<div style="margin:6px 0"><div style="display:flex;justify-content:space-between;font-size:.48rem;color:var(--muted)"><span>Calidad</span><span>'+(t.rating||50)+'/100</span></div><div style="height:5px;border-radius:3px;background:var(--border);overflow:hidden"><div style="height:100%;border-radius:3px;width:'+(t.rating||50)+'%;background:'+bc+'"></div></div></div>';
  if(t.form&&t.form.length)h+='<div style="font-size:.48rem;color:var(--muted);margin-bottom:4px">Forma: '+fd+'</div>';
  var mt=t.matches_detail||[];
  if(mt.length){h+='<div class="sc"><h4>Fase de grupos</h4>';mt.forEach(function(mt){h+='<div class="rw"><span>'+(mt.result==='w'?'&#9917;':mt.result==='d'?'&#129309;':'&#10060;')+'</span><span>'+mt.score+' vs '+mt.opponent+'</span></div>'});h+='</div>';}
  var ko=gk(n);
  if(ko.length){h+='<div class="sc" style="margin-top:6px"><h4>Eliminatorias</h4>';ko.forEach(function(k){h+='<div class="rw"><span>'+(k.r==='w'?'&#9917;':k.r==='d'?'&#129309;':'&#10060;')+'</span><span>'+k.s+' vs '+k.o+' <small style="opacity:.6">('+k.lb+')</small></span></div>'});h+='</div>';}
  h+='</div>';
  el.innerHTML=h;
  el.style.display='flex';
}

function tc(){
  var el=document.getElementById('ch');
  if(el.style.display==='flex'){el.style.display='none';return}
  document.getElementById('chBody').innerHTML='<h3 style="font-size:.7rem;color:var(--blue);margin-bottom:8px">Historial de versiones</h3>'+
    CL.map(function(e){return'<div class="en"><strong style="color:var(--blue)">v'+e.v+'</strong> <span style="color:var(--muted);font-size:.48rem">'+e.date+'</span><br>'+e.text+'</div>';}).join('')+
    '<button onclick="document.getElementById(\'ch\').style.display=\'none\'" style="margin-top:10px;background:var(--blue);color:#fff;border:none;padding:4px 14px;border-radius:6px;cursor:pointer;font-size:.55rem;font-weight:600">Cerrar</button>';
  el.style.display='flex';
}

function fv(iso){
  if(!iso||iso==='?')return 'v'+VC+' &middot; --';
  try{var d=new Date(iso);return 'v'+VC+' &middot; '+('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+' '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)}catch(e){return 'v'+VC+' &middot; '+iso}
}

function ut(){
  var n=new Date(),nx=new Date(Math.ceil(n.getTime()/1800000)*1800000+480000);
  document.getElementById('nextUpdate').textContent=nx.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  var d=Math.max(0,Math.floor((nx-n)/1000));
  document.getElementById('countdown').textContent='('+Math.floor(d/60)+':'+('0'+(d%60)).slice(-2)+')';
  if(d===0)ld();
  setTimeout(ut,1000);
}

ld();
setTimeout(ut,200);
setInterval(ld,60000);
window.addEventListener('resize',function(){if(D&&D.rounds){rb();}});
</script>
</body>
</html>
