<style>
  :root {
    --bg: #0a0e14;
    --card: #12171f;
    --border: #1e2733;
    --text: #dde2e8;
    --muted: #6b7a8d;
    --accent: #00c896;
    --green: #10b981;
    --yellow: #f5a623;
    --red: #ef4444;
    --orange: #f97316;
    --blue: #60a5fa;
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
    line-height: 1.4;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header h1 {
    font-size: 2.4rem;
    font-weight: 800;
    letter-spacing: -1px;
    color: #fff;
    margin-bottom: 2px;
  }
  .header h1 span { color: var(--accent); }
  .header .author {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .header .author a {
    color: var(--blue);
    text-decoration: none;
  }
  .header .author a:hover { text-decoration: underline; }
  .header .update-info {
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .header .update-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
  }
  .btn-refresh {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 32px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 30px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    letter-spacing: -0.2px;
  }
  .btn-refresh:hover {
    filter: brightness(1.12);
    transform: scale(1.03);
  }
  .btn-refresh:active { transform: scale(0.97); }

  /* ── Legend ── */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    justify-content: center;
    margin-bottom: 28px;
    font-size: 0.82rem;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--card);
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
  }

  /* ── Grid ── */
  .groups-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(370px, 1fr));
    gap: 16px;
    max-width: 1550px;
    margin: 0 auto;
  }

  /* ── Group Card ── */
  .group-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    flex-direction: column;
  }
  .group-card h2 {
    font-size: 1.1rem;
    color: var(--accent);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .group-card h2 .round { font-size: 0.7rem; color: var(--muted); font-weight: 400; margin-left: auto; }

  /* ── Table ── */
  .standings-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
    margin-bottom: 10px;
  }
  .standings-table th {
    text-align: left;
    color: var(--muted);
    font-weight: 500;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 6px 4px;
    border-bottom: 1px solid var(--border);
  }
  .standings-table th.center { text-align: center; }
  .standings-table td {
    padding: 7px 4px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    vertical-align: middle;
  }
  .standings-table td.team-name {
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .standings-table td.team-name .flag { font-size: 1.2rem; }
  .standings-table td.pts { text-align: center; font-weight: 700; font-size: 0.95rem; }
  .standings-table td.st { text-align: center; font-size: 1rem; }

  /* ── Match Results ── */
  .match-results {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 4px;
    padding-left: 4px;
    line-height: 1.6;
  }
  .match-results .w { color: var(--green); }
  .match-results .d { color: var(--yellow); }
  .match-results .l { color: var(--red); }
  .match-results .sep { color: #444; margin: 0 2px; }

  /* ── Pending ── */
  .pending-section {
    margin-top: 10px;
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }
  .pending-title {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .pending-match {
    font-size: 0.74rem;
    color: var(--blue);
    padding: 3px 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .pending-match .date {
    font-size: 0.65rem;
    color: var(--muted);
    min-width: 42px;
  }

  /* ── Summary ── */
  .group-summary {
    margin-top: 10px;
    background: rgba(255,255,255,0.02);
    border-radius: 10px;
    padding: 12px;
    font-size: 0.75rem;
    color: var(--muted);
    line-height: 1.5;
    border-left: 3px solid var(--accent);
  }
  .group-summary strong { color: var(--text); }

  /* ── Footer ── */
  .footer {
    text-align: center;
    margin-top: 40px;
    padding: 20px;
    font-size: 0.7rem;
    color: var(--muted);
  }
  .footer a { color: var(--accent); text-decoration: none; }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .groups-grid { grid-template-columns: 1fr; }
    .header h1 { font-size: 1.8rem; }
    body { padding: 10px; }
    .btn-refresh { padding: 10px 24px; font-size: 0.9rem; }
  }
</style>

// ═══════════════ RENDER ═══════════════
function render() {
  const container = document.getElementById('app');
  groups.forEach(g => {
    const card = document.createElement('div');
    card.className = 'group-card';

    // Header
    let html = '<h2>⚽ ' + g.name + '<span class="round">Jornada ' + (g.teams[0].results.length) + '/3</span></h2>';

    // Standings table
    html += '<table class="standings-table"><thead><tr>';
    html += '<th>Equipo</th><th class="center" style="width:30px">Pts</th><th style="width:30px">DG</th><th class="center" style="width:30px"></th>';
    html += '</tr></thead><tbody>';
    g.teams.forEach(t => {
      html += '<tr>';
      html += '<td class="team-name"><span class="flag">' + t.flag + '</span>' + t.name + '</td>';
      html += '<td class="pts">' + t.pts + '</td>';
      html += '<td>' + t.dg + '</td>';
      html += '<td class="st">' + t.st + '</td>';
      html += '</tr>';

      // Match results
      html += '<tr><td colspan="4">';
      html += '<div class="match-results">';
      // Played matches
      if (t.results.length > 0) {
        html += '<span style="color:var(--muted);">Jugados: </span>';
        t.results.forEach((m, i) => {
          if (i > 0) html += '<span class="sep"> · </span>';
          const cls = m.r === 'w' ? 'w' : m.r === 'd' ? 'd' : 'l';
          const icon = m.r === 'w' ? '✅' : m.r === 'd' ? '⚖️' : '❌';
          html += '<span class="' + cls + '">' + m.home + ' ' + m.score + ' ' + m.away + ' ' + icon + '</span>';
        });
      }
      // Pending matches
      if (t.pending.length > 0) {
        html += '<br><span style="color:var(--blue);">Pendiente: </span>';
        t.pending.forEach((p, i) => {
          if (i > 0) html += ' · ';
          html += '<span style="color:var(--blue);">vs ' + p.vs + ' <span style="color:var(--muted);font-size:0.65rem;">(' + p.date + ')</span></span>';
        });
      }
      html += '</div></td></tr>';
    });
    html += '</tbody></table>';

    // Group summary
    html += '<div class="group-summary">' + g.summary + '</div>';

    // Pending section
    html += '<div class="pending-section">';
    html += '<div class="pending-title">📋 Próximos partidos del grupo</div>';
    html += '<div style="font-size:0.73rem;color:var(--muted);">' + g.pendingGroup + '</div>';
    html += '</div>';

    card.innerHTML = html;
    container.appendChild(card);
  });

  // Update time
  const now = new Date();
  document.getElementById('lastUpdate').textContent = 
    now.toLocaleDateString('es-AR', {day:'2-digit',month:'short',year:'numeric'}) + ' ' +
    now.toLocaleTimeString('es-AR', {hour:'2-digit',minute:'2-digit'}) + ' ARG';
}

render();
</script>
