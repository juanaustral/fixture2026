async function loadData(){
  let d=null;
  try{const r=await fetch(API);d=await r.json()}catch(e){}
  if(!d||!d.groups)d=DEFAULT_DATA;
  G=d.groups;upcoming=d.upcoming;
  document.getElementById('versionTag').textContent=d.updated||'?';
  document.getElementById('widgetGrid').innerHTML='';
  document.getElementById('app').innerHTML='';
  renderWidget();render();
}

function buscarEquipo(nombre,grupos){
  const l=nombre.replace(/[^a-zA-Záéíóúñü ]/g,'').trim().toLowerCase();
  for(const g of grupos)for(const t of g.teams){
    const tn=t.name.replace(/[^a-zA-Záéíóúñü ]/g,'').trim().toLowerCase();
    if(tn.includes(l)||l.includes(tn))return{equipo:t,grupo:g.name}
  }
  return null;
}

function renderWidget(){
  const grid=document.getElementById('widgetGrid');
  const slots={};
  upcoming.forEach(m=>{if(!slots[m.time])slots[m.time]=[];slots[m.time].push(m)});
  const order=['26 Jun 16:00','26 Jun 21:00','27 Jun 00:00','27 Jun 18:00','27 Jun 20:30','27 Jun 23:00'];
  order.forEach(time=>{
    if(!slots[time])return;
    const hdr=document.createElement('div');
    hdr.style.cssText='grid-column:1/-1;font-size:.72rem;font-weight:700;color:var(--blue);margin-top:4px;padding:4px 0;border-bottom:1px solid var(--border)';
    hdr.textContent='🕐 '+time+' ARG';grid.appendChild(hdr);
    slots[time].forEach(m=>{
      const hInfo=buscarEquipo(m.home.replace(/[^a-zA-Záéíóúñü ]/g,'').trim(),G);
      const aInfo=buscarEquipo(m.away.replace(/[^a-zA-Záéíóúñü ]/g,'').trim(),G);
      let an='';
      if(hInfo&&aInfo){
        const h=hInfo.equipo,a=aInfo.equipo;
        const hS=h.status,aS=a.status;
        const hCls=h.sclass,aCls=a.sclass;
        // Build rich commentary
        var lines=[];
        // Home team
        var hLine='<span class="st-tag '+hCls+'" style="font-size:.58rem">'+hS+'</span> <strong>'+h.flag+' '+h.name+'</strong> ('+h.pts+' pts)';
        if(h.req)hLine+=' — '+h.req.charAt(0).toLowerCase()+h.req.slice(1);
        lines.push(hLine);
        // Away team
        var aLine='<span class="st-tag '+aCls+'" style="font-size:.58rem">'+aS+'</span> <strong>'+a.flag+' '+a.name+'</strong> ('+a.pts+' pts)';
        if(a.req)aLine+=' — '+a.req.charAt(0).toLowerCase()+a.req.slice(1);
        lines.push(aLine);
        // Extra context
        if(hCls==='st-c'&&aCls!=='st-c')lines.push('🏆 '+h.name+' ya clasificado — '+a.name+' se juega la vida.');
        else if(aCls==='st-c'&&hCls!=='st-c')lines.push('🏆 '+a.name+' ya clasificado — '+h.name+' se juega la vida.');
        else if(hCls==='st-a'&&aCls==='st-a')lines.push('🔥 Duelo directo: el ganador se lleva la clasificación.');
        else if(hCls==='st-p'&&aCls==='st-p')lines.push('⚠️ Ambos necesitan ganar y esperar otros resultados.');
        an=lines.join('<br>');
      }
      const c=document.createElement('div');c.className='w-match';
      c.innerHTML='<div class="w-teams"><span class="w-group">'+m.group+'</span>'+m.home+' <span class="vs">vs</span> '+m.away+'</div><div class="w-analysis">'+an+'</div>';
      grid.appendChild(c);
    });
  });
}

function render(){
  const app=document.getElementById('app');
  G.forEach((g,i)=>{
    const c=document.createElement('div');c.className='group-card t'+(i%5);
    let h='<h2>'+g.name+'<span class="badge">Jornada '+g.teams[0].played+'/3</span></h2>';
    h+='<table><thead><tr><th>Equipo</th><th class="c">Pts</th><th class="c">PP</th><th>Estado</th></tr></thead><tbody>';
    g.teams.forEach((t,j)=>{
      const r=j%2===0?'tr-even':'tr-odd';
      h+='<tr class="'+r+'"><td class="team"><span class="flag">'+t.flag+'</span>'+t.name+'</td><td class="pts c">'+t.pts+'</td><td class="c">'+t.pending+'</td><td><span class="st-tag '+t.sclass+'">'+t.status+'</span></td></tr>';
      h+='<tr class="'+r+'"><td colspan="4"><div class="m-line"><span class="mlb">Jugados</span> ';
      t.matches.forEach((m,k)=>{if(k)h+=' · ';h+='<span class="m'+(m.result==='w'?'w':m.result==='d'?'d':'l')+'">'+m.score+' vs '+m.opponent+'</span>'});
      if(t.pendientes&&t.pendientes.length){h+=' &nbsp;|&nbsp; <span class="mlb">Pendiente</span> ';t.pendientes.forEach((p,k)=>{if(k)h+=' · ';h+='<span class="mp">vs '+p.flag+' '+p.vs+' ('+p.date+')</span>'})}
      if(t.req)h+='<div class="req-line">→ '+t.req+'</div>';
      h+='</div></td></tr>';
    });
    h+='</tbody></table>';
    if(g.pendientes&&g.pendientes!=='—')h+='<div class="pendientes"><strong>⏳ Pendientes:</strong> '+g.pendientes+'</div>';
    h+='<div class="group-reqs"><strong>Estado del grupo:</strong><br>'+g.resumen.map(r=>'<div>'+r+'</div>').join('')+'</div>';
    c.innerHTML=h;app.appendChild(c);
  });
}

function updateTimers(){
  var n=new Date(),nx=new Date(Math.ceil(n.getTime()/1800000)*1800000+480000);
  document.getElementById('nextUpdate').textContent=nx.toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'numeric'})+' '+nx.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})+' ARG';
  var d=Math.max(0,Math.floor((nx-n)/1000));
  document.getElementById('countdown').textContent='(en '+Math.floor(d/60)+':'+('0'+(d%60)).slice(-2)+')';
  if(d===0)location.reload(true);else setTimeout(updateTimers,1000);
}

(function(){var f=document.getElementById('trophyField');for(var i=0;i<20;i++){var t=document.createElement('img');t.src='https://raw.githubusercontent.com/juanaustral/fixture2026/main/trophy.png';t.className='trophy-float';t.style.cssText='--dur:'+(14+Math.random()*20)+'s;--delay:'+(Math.random()*-20)+'s;--dx:'+((Math.random()-.5)*200)+'px;--rot:'+(Math.random()*720-360)+'deg;--op:'+(.03+Math.random()*.05)+';left:'+(Math.random()*95)+'vw;width:'+(22+Math.random()*30)+'px';f.appendChild(t)}})();

loadData().then(()=>{updateTimers();setInterval(loadData,60000)});
