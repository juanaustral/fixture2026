  { h:"🇨🇿 Rep. Checa", a:"🇲🇽 México", g:"A", t:"25 Jun 22:00" },
  { h:"🇿🇦 Sudáfrica", a:"🇰🇷 Corea del Sur", g:"A", t:"25 Jun 22:00" },

  { h:"🇨🇼 Curazao", a:"🇨🇮 Costa de Marfil", g:"E", t:"25 Jun 17:00" },
  { h:"🇹🇳 Túnez", a:"🇳🇱 Países Bajos", g:"F", t:"25 Jun 20:00" },

];

const resultLabel = { w: '✅', d: '⚖️', l: '❌' };
const resultClass = { w: 'wl', d: 'dl', l: 'll' };

// Genera análisis automático basado en puntos, DG y fecha
function generarAnalisis(teams, pend) {
  const lines = [];
  const ordenados = [...teams].sort((a,b) => b.p - a.p || (parseInt(b.d) - parseInt(a.d)));
  
  // Si no hay partidos pendientes, el grupo está cerrado
  const cerrado = !pend || pend === "—";
  
  ordenados.forEach(t => {
    let txt = "";
    const tienePartido = pend && pend.includes(t.f);
    
    if (t.s === "✅") {
      txt = `${t.f} ${t.n} — ya clasificado`;
      if (t.p === 9 || (t.p === 7 && cerrado)) txt += " como 1° del grupo";
      else if (t.p >= 4 && !tienePartido) txt += ".c.position";
    } else if (t.s === "⛔") {
      txt = `${t.f} ${t.n} — eliminado`;
    } else if (t.s === "⚠️") {
      if (tienePartido || (t.p >= 3 && !cerrado)) {
        txt = `${t.f} ${t.n} — depende de sí mismo`;
        // Determinar si necesita ganar o empate
        const difConSiguiente = ordenados.indexOf(t) > 0 ? 
          ordenados[ordenados.indexOf(t)-1].p - t.p : 0;
        if (difConSiguiente <= 1 && t.p >= 4) txt += " (empate le alcanza)";
        else txt += " (necesita ganar)";
      } else {
        txt = `${t.f} ${t.n} — espera como mejor 3°`;
      }
    } else if (t.s === "🛟") {
      const puedeGanar = tienePartido;
      if (puedeGanar) txt = `${t.f} ${t.n} — necesita ganar y esperar resultados`;
      else txt = `${t.f} ${t.n} — chances matemáticas casi nulas`;
    }
    lines.push(txt);
  });
  
  // Resumen del grupo
  if (!cerrado && pend) {
    const enJuego = ordenados.filter(t => pend.includes(t.f.split(" ")[0])).length;
    if (enJuego > 0) lines.push(`⚡ ${pend.replace(/·/g,'y')} definirán el grupo`);
  }
  
  // Quien tiene la clasificación asegurada
  const clasificados = ordenados.filter(t => t.s === "✅").length;
  if (clasificados > 0 && !cerrado) {
    lines.unshift(`🏆 ${clasificados} equipo(s) ya clasificado(s)`);
  }
  
  // Ordenar: primero resumen, después cada equipo
  // Devolvemos solo los bullets relevantes
  return lines.filter(l => l.length > 5);
}

// Busca un equipo en los datos por nombre (aproximado)
function buscarEquipo(nombre, grupos) {
  for (const g of grupos) {
    for (const t of g.teams) {
      if (t.n.toLowerCase().includes(nombre.toLowerCase()) || 
          nombre.toLowerCase().includes(t.n.toLowerCase())) {
        return { equipo: t, grupo: g.name };
      }
    }
  }
  return null;
}

function statusIcon(s) {
  if (s === "✅") return "✅";
  if (s === "⚠️") return "⚠️";
  if (s === "🛟") return "🛟";
  if (s === "⛔") return "⛔";
  return "";
}

function statusClass(s) {
  if (s === "✅") return "st-c";
  if (s === "⚠️") return "st-a";
  if (s === "🛟") return "st-p";
  if (s === "⛔") return "st-e";
  return "";
}

// Próximos partidos con análisis
function generarComentarioPartido(hInfo, aInfo) {
  if (!hInfo || !aInfo) return "";
  const h = hInfo.equipo;
  const a = aInfo.equipo;
  
  function presion(s) {
    if (s === "⛔") return "sin presión";
    if (s === "✅") return "sin presión";
    if (s === "⚠️") return "máxima presión";
    if (s === "🛟") return "presión extrema";
    return "";
  }
  
  function situacion(equipo) {
    if (equipo.s === "✅") return `ya está en 16vos`;
    if (equipo.s === "⛔") return `ya está eliminado`;
    if (equipo.s === "⚠️") {
      if (equipo.p >= 4) return `le basta un empate`;
      return `tiene que ganar sí o sí`;
    }
    if (equipo.s === "🛟") {
      if (equipo.p >= 3) return `gana pero depende de otros`;
      return `necesita un milagro`;
    }
    return "";
  }
  
  const hPre = presion(h.s);
  const aPre = presion(a.s);
  const hSit = situacion(h);
  const aSit = situacion(a);
  
  let linea1 = `${h.f} ${h.n} (${h.p}pts): ${hSit} — ${hPre}`;
  let linea2 = `${a.f} ${a.n} (${a.p}pts): ${aSit} — ${aPre}`;
  
  return [linea1, linea2];
}

const grid = document.getElementById('matchGrid');
upcoming.forEach(m => {
  const card = document.createElement('div');
  card.className = 'match-card';
  
  // Buscar situación de cada equipo
  const hInfo = buscarEquipo(m.h.replace(/[^a-zA-Záéíóúñü ]/g,'').trim(), G);
  const aInfo = buscarEquipo(m.a.replace(/[^a-zA-Záéíóúñü ]/g,'').trim(), G);
  
  const hStatus = hInfo ? statusIcon(hInfo.equipo.s) : "";
  const aStatus = aInfo ? statusIcon(aInfo.equipo.s) : "";
  const hStCls = hInfo ? statusClass(hInfo.equipo.s) : "";
  const aStCls = aInfo ? statusClass(aInfo.equipo.s) : "";
  const hStText = hInfo ? hInfo.equipo.st : "";
  const aStText = aInfo ? aInfo.equipo.st : "";
  const comentario = generarComentarioPartido(hInfo, aInfo);
  
  card.innerHTML = `
    <div class="match-teams">
      <span>${m.h} ${hStatus}</span> <span class="vs">vs</span> <span>${aStatus} ${m.a}</span>
    </div>
    <div class="match-info">
      <span class="group-label">${m.g}</span> · ${m.t}
    </div>
    <div style="margin-top:6px;font-size:0.65rem;line-height:1.5;color:#555;text-align:left">
      <span class="status-tag ${hStCls}" style="font-size:0.6rem">${hStText}</span>
      <span style="color:#86868b;font-size:0.6rem"> vs </span>
      <span class="status-tag ${aStCls}" style="font-size:0.6rem">${aStText}</span>
    </div>
    <div style="margin-top:5px;font-size:0.65rem;line-height:1.4;text-align:left;background:#eef3ff;padding:5px 7px;border-radius:6px">
      <div>${comentario[0]}</div>
      <div style="margin-top:1px">${comentario[1]}</div>
    </div>`;
  grid.appendChild(card);
});

const app = document.getElementById('app');

  h += '<table><thead><tr><th>Equipo</th><th class="c">Pts</th><th class="c">DG</th><th class="c"></th></tr></thead><tbody>';
  g.teams.forEach(t => {
    const parts = t.m.map(m => `<span class="${resultClass[m.r]}">${m.v} ${m.c} ${resultLabel[m.r]}</span>`).join(' · ');
    h += `<tr><td class="team"><span class="flag">${t.f}</span>${t.n}<br><span style="font-size:0.6rem;color:#555;line-height:1.6;display:block;padding-left:1.5rem">${parts} · <span class="status-tag ${t.sc}">${t.st}</span></span></td>`;
    h += `<td class="pts c">${t.p}</td><td class="c">${t.d}</td><td class="c">${t.s}</td></tr>`;
  });
  h += '</tbody></table>';
  if (g.pend && g.pend !== "—") {
    h += `<div class="pendientes"><strong>⏳ Pendientes:</strong> ${g.pend}</div>`;
  }
  // Análisis automático
  const bullets = generarAnalisis(g.teams, g.pend);
  if (bullets.length > 0) {
    h += '<div class="analisis"><ul>';
    bullets.forEach(b => { h += `<li>• ${b}</li>`; });
    h += '</ul></div>';
  }
  h += `<div class="card-footer"><span class="source">Yahoo Sports · TUDN</span><button class="btn" onclick="location.reload()">↻ Recargar</button></div>`;
  card.innerHTML = h;
  app.appendChild(card);
});
