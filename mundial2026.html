  :root {

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
  }
  h1 {
    text-align: center;
    font-size: 1.8rem;
    margin-bottom: 4px;
    color: #fff;
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 24px;
  }
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    margin-bottom: 24px;
    font-size: 0.8rem;
  }
  .legend span {
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; }
  .dot.green { background: var(--green); }
  .dot.yellow { background: var(--yellow); }
  .dot.orange { background: var(--orange); }
  .dot.red { background: var(--red); }

  .groups-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .group-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
  }
  .group-card h2 {
    font-size: 1rem;
    color: var(--accent);
    margin-bottom: 10px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
  }
  th {
    text-align: left;
    color: var(--muted);
    font-weight: 500;
    padding: 4px 3px;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  th.pts { text-align: center; width: 28px; }
  th.status { text-align: center; width: 40px; }
  td { padding: 5px 3px; border-top: 1px solid rgba(255,255,255,0.04); }
  td.team { font-weight: 500; }
  td.pts { text-align: center; font-weight: 700; }
  td.status { text-align: center; font-size: 1rem; }
  .flag { font-size: 1.1rem; margin-right: 4px; }
  .matches {
    margin-top: 6px;
    font-size: 0.7rem;
    color: var(--muted);
    line-height: 1.5;
    padding-top: 6px;
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  .matches span { display: inline; }
  .win { color: var(--green); }
  .draw { color: var(--yellow); }
  .loss { color: var(--red); }
  .tag {
    display: inline-block;
    font-size: 0.6rem;
    padding: 1px 6px;
    border-radius: 6px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .tag-green { background: rgba(0,200,83,0.15); color: var(--green); }
  .tag-yellow { background: rgba(255,214,0,0.15); color: var(--yellow); }
  .tag-orange { background: rgba(255,145,0,0.15); color: var(--orange); }
  .tag-red { background: rgba(255,23,68,0.15); color: var(--red); }

  .footer {
    text-align: center;
    margin-top: 32px;
    font-size: 0.7rem;
    color: var(--muted);
  }
  @media (max-width: 480px) {
    .groups-grid { grid-template-columns: 1fr; }
    body { padding: 10px; }
  }
</style>

function tagHtml(text, cls) {
  return '<span class="tag tag-' + cls + '">' + text + '</span>';
}

function matchesHtml(arr) {
  return arr.map(m => {
    if (m.includes('W')) return '<span class="win">' + m.replace(' W', ' вњ…') + '</span>';
    if (m.includes('D')) return '<span class="draw">' + m.replace(' D', ' вљ–пёЏ') + '</span>';
    if (m.includes('L')) return '<span class="loss">' + m.replace(' L', ' вќЊ') + '</span>';
    return m;
  }).join(' В· ');
}

function render() {
  const container = document.getElementById('app');
  groups.forEach(g => {
    const card = document.createElement('div');
    card.className = 'group-card';
    let html = '<h2>' + g.name + '</h2>';
    html += '<table><thead><tr><th>Equipo</th><th class="pts">Pts</th><th>DG</th><th class="status"></th></tr></thead><tbody>';
    g.teams.forEach(t => {
      html += '<tr>';
      html += '<td class="team"><span class="flag">' + t.flag + '</span>' + t.name + '</td>';
      html += '<td class="pts">' + t.pts + '</td>';
      html += '<td>' + t.dg + '</td>';
      html += '<td class="status">' + t.status + '</td>';
      html += '</tr>';
      html += '<tr><td colspan="4" class="matches">' + matchesHtml(t.matches.split(' В· '));
      html += ' &nbsp;вЂ”&nbsp; ' + tagHtml(t.tag, t.tagClass);
      html += '</td></tr>';
    });
    html += '</tbody></table>';
    card.innerHTML = html;
    container.appendChild(card);
  });
}
render();
