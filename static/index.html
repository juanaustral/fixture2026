<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akira OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Newsreader:opsz,wght@12..72,400;12..72,500;12..72,600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050508;--bg2:#0a0b10;--surface:rgba(255,255,255,0.03);--surface2:rgba(255,255,255,0.05);--surface3:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.10);
  --text:#f0f0f5;--text2:rgba(255,255,255,0.55);--text3:rgba(255,255,255,0.28);
  --accent:#6C5CE7;--accent-dim:rgba(108,92,231,0.12);--accent-glow:rgba(108,92,231,0.3);
  --green:#00D68F;--green-bg:rgba(0,214,143,0.08);--warning:#FFAA00;--warning-bg:rgba(255,170,0,0.08);--danger:#FF4757;--danger-bg:rgba(255,71,87,0.08);
  --cyan:#00D4FF;--cyan-dim:rgba(0,212,255,0.10);--radius:16px;--radius-sm:12px;--radius-xs:8px;
  --font:'Geist',-apple-system,sans-serif;--mono:'Geist Mono','SF Mono',monospace;--gap:14px;--t:180ms cubic-bezier(0.16,1,0.3,1);
}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%;overflow:hidden;font-family:var(--font)}
body{background:radial-gradient(ellipse at 50% 0%,rgba(108,92,231,0.06)0%,transparent 60%),var(--bg);color:var(--text);font-size:13px;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
#header{height:54px;display:flex;align-items:center;gap:4px;flex-shrink:0;padding:0 20px;background:rgba(10,11,16,0.85);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);z-index:50}
.header-brand{font-weight:700;font-size:15px;letter-spacing:-0.3px;display:flex;align-items:center;gap:7px;padding-right:24px;color:var(--text)}
.header-brand span{color:var(--accent)}
.tab{padding:7px 15px;border-radius:9px;font-size:12.5px;color:var(--text2);cursor:pointer;transition:var(--t);border:none;background:transparent;font-family:var(--font);font-weight:500}
.tab:hover{color:var(--text);background:var(--surface2)}.tab.active{background:var(--accent-dim);color:var(--accent);font-weight:600}
.header-spacer{flex:1}.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;box-shadow:0 0 8px currentColor}
.btn-icon{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:9px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-size:15px;transition:var(--t)}
.btn-icon:hover{background:var(--surface3);color:var(--text);border-color:var(--border2)}
#main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.section{flex:1;overflow-y:auto;display:none;padding:18px}.section.active{display:flex;flex-direction:column}
.section::-webkit-scrollbar{width:4px}.section::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* DASHBOARD */
.kpi-hero{background:linear-gradient(135deg,var(--surface)0%,var(--surface2)100%);border:1px solid var(--border);border-radius:var(--radius);padding:26px 28px;margin-bottom:var(--gap);display:flex;gap:20px;align-items:center}
.kpi-main{flex:1}.kpi-score{font-size:68px;font-weight:700;letter-spacing:-2.5px;line-height:1}.kpi-label{font-size:13px;color:var(--text2);margin-top:3px;font-weight:500}
.kpi-bar{width:100%;height:4px;background:rgba(255,255,255,0.04);border-radius:2px;margin-top:12px;overflow:hidden}.kpi-bar-fill{height:100%;border-radius:2px;transition:width 0.7s var(--t)}
.kpi-details{display:flex;flex-direction:column;gap:7px;min-width:240px}.kpi-detail{font-size:12.5px;color:var(--text2);display:flex;align-items:center;gap:8px}
.metrics-row{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--gap);margin-bottom:var(--gap)}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;transition:var(--t)}
.metric-card:hover{border-color:var(--border2);background:var(--surface2)}.metric-card.alert{border-color:rgba(255,71,87,0.15);background:rgba(255,71,87,0.03)}.metric-card.warn{border-color:rgba(255,170,0,0.15);background:rgba(255,170,0,0.03)}
.metric-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}.metric-title{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;font-weight:600}
.metric-value{font-size:28px;font-weight:700;letter-spacing:-0.8px}.metric-sub{font-size:11px;color:var(--text3);margin-top:1px;font-family:var(--mono)}.metric-trend{font-size:10.5px;margin-top:6px;font-weight:500}
.metric-trend.ok{color:var(--green)}.metric-trend.warn{color:var(--warning)}.metric-trend.err{color:var(--danger)}
.panels-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--gap);margin-bottom:var(--gap)}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}.panel-header{display:flex;align-items:center;gap:8px;padding:14px 18px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;transition:var(--t)}.panel-header:hover{background:var(--surface2)}.panel.collapsed .caret{transform:rotate(-90deg)}.caret{font-size:9px;transition:transform 0.15s;color:var(--text3)}.panel-title{flex:1;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.04em}.panel-badge{font-size:10.5px;padding:2px 10px;border-radius:10px;font-weight:600}.panel-body{padding:12px 18px;max-height:280px;overflow-y:auto}.panel.collapsed .panel-body{display:none}
.list-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12.5px}.list-item:last-child{border-bottom:none}.list-status{width:6px;height:6px;border-radius:50%;flex-shrink:0}.list-status.up{background:var(--green);box-shadow:0 0 6px rgba(0,214,143,0.4)}.list-status.down{background:var(--danger)}.list-status.warn{background:var(--warning)}.list-text{flex:1;color:var(--text2)}.list-text strong{color:var(--text);font-weight:600}.list-meta{font-size:10.5px;color:var(--text3);font-family:var(--mono)}
.activity{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px}.activity-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px}.activity-line{font-family:var(--mono);font-size:9.5px;color:var(--text3);padding:2px 0;display:flex;gap:10px}.activity-line .ok{color:var(--green)}.activity-line .err{color:var(--danger)}.activity-line .warn{color:var(--warning)}

/* CHAT */
.chat-messages{flex:1;overflow-y:auto;padding:0 0 var(--gap)0;display:flex;flex-direction:column;gap:10px}.chat-msg{max-width:75%;padding:11px 15px;border-radius:var(--radius-sm);font-size:13px;line-height:1.5}.chat-msg.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px}.chat-msg.assistant{align-self:flex-start;background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px}.chat-msg.assistant pre{background:var(--bg);padding:10px 14px;border-radius:8px;overflow-x:auto;font-family:var(--mono);font-size:10.5px;margin:5px 0;border:1px solid var(--border)}.chat-input-row{display:flex;gap:10px;padding:var(--gap)0 0 0;border-top:1px solid var(--border);flex-shrink:0}.chat-input{flex:1;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:13px;outline:none;resize:none;min-height:42px;max-height:120px}.chat-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}.chat-send{padding:10px 20px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font);font-size:13px;font-weight:600;transition:var(--t);white-space:nowrap}.chat-send:hover{filter:brightness(1.1)}.chat-send:disabled{opacity:0.4}

/* AGENDA */
.agenda-toolbar{display:flex;gap:8px;margin-bottom:var(--gap);flex-shrink:0}.agenda-btn{padding:8px 16px;border-radius:9px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-size:12px;font-family:var(--font);font-weight:500;transition:var(--t)}.agenda-btn:hover{border-color:var(--border2);color:var(--text)}.agenda-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}.agenda-layout{display:grid;grid-template-columns:1fr 1fr;gap:var(--gap);flex:1;overflow:hidden}.agenda-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;overflow:hidden}.agenda-col-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.04em;flex-shrink:0}.agenda-col-body{flex:1;overflow-y:auto;padding:10px}.agenda-col-footer{padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}.agenda-input{flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:9px;font-family:var(--font);font-size:12px;outline:none;background:var(--bg);color:var(--text)}.agenda-input:focus{border-color:var(--accent)}.event-card,.task-card{padding:12px 14px;border-radius:10px;margin-bottom:5px;border:1px solid var(--border);transition:var(--t)}.event-card:hover,.task-card:hover{border-color:var(--border2);background:var(--surface2)}.task-card.done{opacity:0.35}.task-card.done .task-title{text-decoration:line-through}.event-date-badge{font-size:10.5px;font-weight:600;padding:3px 10px;border-radius:8px;display:inline-block;margin-bottom:5px}.event-date-badge.today{background:var(--accent-dim);color:var(--accent)}.event-date-badge.soon{background:var(--cyan-dim);color:var(--cyan)}.event-date-badge.later{background:var(--surface3);color:var(--text2)}.event-title,.task-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:1px}.event-time-loc{font-size:11px;color:var(--text2);font-family:var(--mono)}.task-due{font-size:10.5px;margin-top:4px;font-family:var(--mono)}.task-due.normal{color:var(--text3)}.task-due.overdue{color:var(--danger);font-weight:600}.task-actions{display:flex;gap:6px;margin-top:8px}.task-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:10.5px;font-family:var(--font);transition:var(--t);color:var(--text2)}.task-btn:hover{color:var(--text);border-color:var(--border2)}.task-btn.done-btn{color:var(--green);border-color:rgba(0,214,143,0.2)}.task-btn.done-btn:hover{background:var(--green-bg)}.calendar-mini{padding:10px}.cm-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.cm-title{font-size:14px;font-weight:600}.cm-nav{display:flex;gap:4px}.cm-nav button{width:30px;height:30px;border:1px solid var(--border);border-radius:8px;background:var(--surface);cursor:pointer;font-size:15px;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:var(--t)}.cm-nav button:hover{background:var(--surface2);color:var(--text)}.cm-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}.cm-day-hdr{font-size:9px;color:var(--text3);padding:3px 0;text-transform:uppercase;letter-spacing:0.04em;font-weight:600}.cm-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:7px;font-size:11px;cursor:pointer;color:var(--text2);position:relative;transition:var(--t)}.cm-day:hover{background:var(--surface3)}.cm-day.today{background:var(--accent-dim);color:var(--accent);font-weight:700}.cm-day.selected{background:var(--accent);color:#fff;font-weight:700}.cm-day.other{color:var(--text3)}.cm-day.has-event::after{content:'';position:absolute;bottom:3px;width:3px;height:3px;border-radius:50%;background:var(--accent)}.empty-state{text-align:center;padding:28px 16px;color:var(--text3);font-size:12.5px}

/* NOTAS */
#notasSection.active{flex-direction:row}
.nb-sidebar{width:280px;flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;overflow:hidden;margin-right:var(--gap)}
.nb-search{padding:10px 12px;border-bottom:1px solid var(--border)}.nb-search input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:var(--font);outline:none;background:var(--bg);color:var(--text)}.nb-search input:focus{border-color:var(--accent)}
.nb-list{flex:1;overflow-y:auto;padding:4px}.nb-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;cursor:pointer;font-size:12px;color:var(--text2);transition:var(--t)}.nb-item:hover{background:var(--surface2);color:var(--text)}.nb-item.active{background:var(--accent-dim);color:var(--accent)}.nb-item .nb-icon{font-size:12px;opacity:0.4;flex-shrink:0}.nb-item .nb-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.nb-item .nb-date{font-size:10px;color:var(--text3);font-family:var(--mono);flex-shrink:0}.nb-footer{padding:8px 12px;border-top:1px solid var(--border);flex-shrink:0}.nb-footer button{width:100%;padding:9px;border-radius:9px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:12px;font-family:var(--font);font-weight:600;transition:var(--t)}.nb-footer button:hover{filter:brightness(1.1)}
.nb-main{flex:1;display:flex;flex-direction:column;overflow:hidden}.nb-welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3)}.nb-welcome-icon{font-size:44px;margin-bottom:6px;opacity:0.3}.nb-welcome-title{font-size:15px;font-weight:600;color:var(--text2)}.nb-welcome-hint{font-size:12px;margin-top:4px}
.nb-editor{flex:1;display:none;flex-direction:column;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}.nb-editor.show{display:flex}.nb-editor-hdr{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;gap:8px}.nb-editor-hdr input{font-size:15px;font-weight:600;border:none;outline:none;font-family:var(--font);color:var(--text);background:transparent;flex:1;min-width:0}.nb-editor-hdr input::placeholder{color:var(--text3)}.nb-actions{display:flex;gap:6px;flex-shrink:0}.nb-btn{padding:6px 12px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:11px;font-family:var(--font);transition:var(--t);white-space:nowrap}.nb-btn:hover{border-color:var(--border2);color:var(--text)}.nb-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}.nb-btn.primary:hover{filter:brightness(1.1)}.nb-btn.danger{color:var(--danger);border-color:rgba(255,71,87,0.2)}.nb-btn.danger:hover{background:var(--danger-bg)}.nb-body{flex:1;overflow:hidden}.nb-body textarea{width:100%;height:100%;min-height:200px;border:none;outline:none;resize:none;font-family:var(--mono);font-size:12.5px;line-height:1.7;color:var(--text);background:transparent;padding:18px}.nb-meta{display:flex;gap:16px;font-size:10.5px;color:var(--text3);padding:8px 18px;font-family:var(--mono);flex-shrink:0;border-top:1px solid var(--border)}

#toasts{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px}.toast{padding:10px 18px;border-radius:9px;font-size:12px;background:var(--surface2);border:1px solid var(--border2);backdrop-filter:blur(12px);animation:toastIn 0.2s;max-width:340px}@keyframes toastIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:900px){.metrics-row{grid-template-columns:1fr 1fr}.agenda-layout,.panels-row{grid-template-columns:1fr}}@media(max-width:640px){.metrics-row{grid-template-columns:1fr}.kpi-hero{flex-direction:column}.kpi-score{font-size:44px}#notasSection.active{flex-direction:column}.nb-sidebar{width:100%;margin-right:0;margin-bottom:var(--gap);max-height:180px}}
</style>
</head>
<body>
<header id="header"><div class="header-brand">Akira <span>OS</span></div><button class="tab active" data-tab="dashboard" onclick="switchTab('dashboard')">Dashboard</button><button class="tab" data-tab="chat" onclick="switchTab('chat')">Chat</button><button class="tab" data-tab="notas" onclick="switchTab('notas')">Notas</button><button class="tab" data-tab="agenda" onclick="switchTab('agenda')">Agenda</button><div class="header-spacer"></div><div class="status-dot" id="hdrDot" title="Estado del sistema"></div><button class="btn-icon" onclick="refreshAll()" title="Actualizar">&#x21bb;</button></header>
<main id="main">
<section class="section active" id="section-dashboard"><div class="kpi-hero" id="kpiHero"><div class="kpi-main"><div class="kpi-score" id="kpiScore">--</div><div class="kpi-label" id="kpiLabel">Analizando sistema...</div><div class="kpi-bar"><div class="kpi-bar-fill" id="kpiBar" style="width:0%"></div></div></div><div class="kpi-details" id="kpiDetails"></div></div><div class="metrics-row" id="metricsRow"></div><div class="panels-row"><div class="panel" id="panelAgenda"><div class="panel-header" onclick="togglePanel('panelAgenda')"><span class="caret">&#x25bc;</span><span class="panel-title">Agenda Hoy</span><span class="panel-badge" style="background:var(--accent-dim);color:var(--accent)" id="panelBadgeAgenda">--</span></div><div class="panel-body" id="panelBodyAgenda"></div></div><div class="panel" id="panelSites"><div class="panel-header" onclick="togglePanel('panelSites')"><span class="caret">&#x25bc;</span><span class="panel-title">Sitios</span><span class="panel-badge" style="background:var(--green-bg);color:var(--green)" id="panelBadgeSites">--</span></div><div class="panel-body" id="panelBodySites"></div></div></div><div class="activity"><div class="activity-title">Actividad reciente</div><div id="activityLines"></div></div></section>
<section class="section" id="section-chat"><div class="chat-messages" id="chatMessages"><div class="chat-msg assistant">Hola. Soy Akira. Preguntame lo que necesites.</div></div><div class="chat-input-row"><textarea class="chat-input" id="chatInput" placeholder="Escribi tu mensaje..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"></textarea><button class="chat-send" id="chatSendBtn" onclick="sendChat()">Enviar</button></div></section>
<section class="section" id="section-agenda"><div class="agenda-toolbar"><button class="agenda-btn active" onclick="setAgendaView('upcoming',this)">Proximos</button><button class="agenda-btn" onclick="setAgendaView('tasks',this)">Tareas</button><button class="agenda-btn" onclick="setAgendaView('calendar',this)">Calendario</button><span style="flex:1"></span><span style="font-size:11px;color:var(--text3)" id="agendaLastSync"></span></div><div class="agenda-layout" id="agendaLayout"></div></section>
<section class="section" id="section-notas"><div class="nb-sidebar"><div class="nb-search"><input type="text" placeholder="Buscar notas..." id="nbSearch" oninput="nbFilter(this.value)"></div><div class="nb-list" id="nbList"><div class="empty-state">Cargando...</div></div><div class="nb-footer"><button onclick="nbNew()">+ Nueva nota</button></div></div><div class="nb-main"><div class="nb-welcome" id="nbWelcome"><div class="nb-welcome-icon">&#x1f4c4;</div><div class="nb-welcome-title">Tus notas de SilverBullet</div><div class="nb-welcome-hint">Selecciona una nota para editarla</div></div><div class="nb-editor" id="nbEditor"><div class="nb-editor-hdr"><input id="nbTitle" placeholder="Titulo..." oninput="nbDirty=true"><div class="nb-actions"><button onclick="nbSave()" class="nb-btn primary">Guardar</button><button onclick="nbDelete()" class="nb-btn danger">Eliminar</button></div></div><div class="nb-body"><textarea id="nbTextarea" placeholder="Escribi en Markdown..." oninput="nbDirty=true"></textarea></div><div class="nb-meta" id="nbMeta"></div></div></div></section>
</main>
<div id="toasts"></div>
<script>
const BASE=location.origin;
let state={vps:{},docker:{},sites:{},notas:{},github:{},tasks:{},calendar:{},deepseek:{}};
let activity=[],activeTab='dashboard',agendaView='upcoming';
let nbPath=null,nbDirty=false,nbTree=[],agendaEvents=[],agendaTasks=[],agendaCalendarDate=new Date();
let calYear,calMonth,chatHistory=[{role:'assistant',content:'Hola. Soy Akira. Preguntame lo que necesites.'}];
function $(id){return document.getElementById(id)}
function switchTab(tab){activeTab=tab;document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',t.dataset.tab===tab)});document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active')});$('section-'+tab).classList.add('active');if(tab==='dashboard')render();if(tab==='chat')$('chatInput').focus();if(tab==='notas')nbLoad();if(tab==='agenda')agendaLoad()}
async function fetchAll(){try{var r=await fetch(BASE+'/api/all');state=await r.json();render();logActivity('ok','Actualizado')}catch(e){logActivity('err','Error: '+e.message)}}
async function refreshAll(){await fetchAll();toast('Actualizado')}
function togglePanel(id){$(id).classList.toggle('collapsed')}

/* DASHBOARD */
function calcHealth(){var s=100,issues=[];var v=state.vps||{},dk=state.docker||{},ds=state.deepseek||{};var sites=(state.sites&&state.sites.sites)?state.sites.sites:[];var cpu=parseFloat(v.cpu)||0;if(cpu>85){s-=25;issues.push({level:'err',text:'CPU: '+cpu.toFixed(0)+'%'})}else if(cpu>60){s-=10;issues.push({level:'warn',text:'CPU: '+cpu.toFixed(0)+'%'})}var mu=parseInt((v.mem&&v.mem.used)||0),mt=parseInt((v.mem&&v.mem.total)||1),mp=(mu/mt*100);if(mp>90){s-=30;issues.push({level:'err',text:'RAM: '+mp.toFixed(0)+'%'})}else if(mp>70){s-=12;issues.push({level:'warn',text:'RAM: '+mp.toFixed(0)+'%'})}var dp=parseFloat((v.disk&&v.disk.pct)||0);if(dp>90){s-=20;issues.push({level:'err',text:'Disco: '+dp+'%'})}else if(dp>75){s-=8;issues.push({level:'warn',text:'Disco: '+dp+'%'})}var cs=dk.containers||[],stopped=cs.filter(function(c){return c.state!=='running'});if(stopped.length>0){s-=12;issues.push({level:'warn',text:stopped.length+' contenedor(es) detenido(s)'})}var down=sites.filter(function(s){return s.status!=='up'});if(down.length>0){s-=10*down.length;issues.push({level:'err',text:down.length+' sitio(s) inaccesible(s)'})}if(!ds.available){s-=5;issues.push({level:'warn',text:'DeepSeek sin conexion'})}else if(parseFloat(ds.balance)<2){s-=15;issues.push({level:'err',text:'DeepSeek: saldo critico'})}return{score:Math.max(0,s),issues:issues}}
function renderKPI(h){var s=h.score,color,label;if(s>=90){color='var(--green)';label='Sistema saludable'}else if(s>=70){color='var(--warning)';label='Requiere atencion'}else{color='var(--danger)';label='Estado critico'}$('kpiScore').style.color=color;$('kpiScore').textContent=s;$('kpiLabel').textContent=label;$('kpiBar').style.width=s+'%';$('kpiBar').style.background=color;$('kpiDetails').innerHTML=h.issues.length===0?'<span style="color:var(--green);font-size:12.5px">Todos los sistemas operativos</span>':h.issues.map(function(i){return'<div class="kpi-detail"><span class="list-status '+(i.level==='err'?'down':'warn')+'"></span>'+escHtml(i.text)+'</div>'}).join('');$('hdrDot').style.background=s>=90?'var(--green)':s>=70?'var(--warning)':'var(--danger)'}
function renderMetrics(){var v=state.vps||{},dk=state.docker||{},ds=state.deepseek||{};var cal=(state.calendar&&state.calendar.events)?state.calendar.events:[];var cpu=parseFloat(v.cpu)||0,mu=parseInt((v.mem&&v.mem.used)||0),mt=parseInt((v.mem&&v.mem.total)||1);var mp=Math.round(mu/mt*100),dp=parseFloat((v.disk&&v.disk.pct)||0);var cs=dk.containers||[],running=cs.filter(function(c){return c.state==='running'}).length;var bal=ds.available?parseFloat(ds.balance):null;var now=new Date(),DAY_MS=86400000;var upcoming=cal.filter(function(e){var d=e.start?new Date(e.start):null;return d&&d>now&&d<new Date(now.getTime()+DAY_MS)});var cards=[{title:'CPU',val:cpu.toFixed(0)+'%',sub:v.load||'',trend:cpu>80?'Alto':cpu>60?'Moderado':'Normal',trendCls:cpu>80?'err':cpu>60?'warn':'ok',cls:cpu>80?'alert':cpu>60?'warn':''},{title:'RAM',val:mp+'%',sub:(mu/1024).toFixed(1)+' / '+(mt/1024).toFixed(1)+' GB',trend:mp>85?'Critica':mp>70?'Alta':'Normal',trendCls:mp>85?'err':mp>70?'warn':'ok',cls:mp>85?'alert':mp>70?'warn':''},{title:'Disco',val:dp+'%',sub:(v.disk&&v.disk.used||'?')+' / '+(v.disk&&v.disk.total||'?'),trend:dp>90?'Critico':dp>75?'Alto':'Normal',trendCls:dp>90?'err':dp>75?'warn':'ok',cls:dp>90?'alert':dp>75?'warn':''},{title:'Servicios',val:running+' / '+cs.length,sub:'Contenedores',trend:running===cs.length?'Todos operativos':(cs.length-running)+' detenidos',trendCls:running===cs.length?'ok':'warn',cls:running<cs.length?'warn':''},{title:'DeepSeek',val:bal!==null?'$'+bal.toFixed(2):'--',sub:'USD disponibles',trend:bal!==null?(bal<2?'Critico':bal<5?'Bajo':'OK'):'Offline',trendCls:bal!==null&&bal<2?'err':bal!==null&&bal<5?'warn':'ok',cls:bal!==null&&bal<2?'alert':bal!==null&&bal<5?'warn':''},{title:'Eventos Hoy',val:upcoming.length+' / '+cal.length,sub:'Prox. 24h / Total',trend:upcoming.length>0?upcoming.length+' eventos hoy':'Sin eventos',trendCls:'ok',cls:''}];$('metricsRow').innerHTML=cards.map(function(c){return'<div class="metric-card '+c.cls+'"><div class="metric-header"><span class="metric-title">'+escHtml(c.title)+'</span></div><div class="metric-value">'+escHtml(c.val)+'</div><div class="metric-sub">'+escHtml(c.sub)+'</div><div class="metric-trend '+c.trendCls+'">'+escHtml(c.trend)+'</div></div>'}).join('')}
function renderPanels(){var cal=(state.calendar&&state.calendar.events)?state.calendar.events:[];var tasks=(state.tasks&&state.tasks.tasks)?state.tasks.tasks:[];var sites=(state.sites&&state.sites.sites)?state.sites.sites:[];var now=new Date(),DAY_MS=86400000,today=new Date(now.getFullYear(),now.getMonth(),now.getDate());var upcoming=cal.filter(function(e){var d=e.start?new Date(e.start):null;return d&&d>=today&&d<new Date(today.getTime()+DAY_MS)});$('panelBadgeAgenda').textContent=upcoming.length+' hoy';var h='';upcoming.slice(0,6).forEach(function(e){var d=e.start?new Date(e.start):null;h+='<div class="list-item"><span class="list-status up"></span><span class="list-text"><strong>'+escHtml(e.summary||'Sin titulo')+'</strong></span><span class="list-meta">'+(d?d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}):'')+'</span></div>'});if(upcoming.length===0)h+='<div class="empty-state">Sin eventos hoy</div>';if(tasks.length>0){h+='<div style="font-size:11px;font-weight:600;color:var(--text2);margin:14px 0 8px;text-transform:uppercase;letter-spacing:0.03em">Tareas ('+tasks.length+')</div>';tasks.slice(0,5).forEach(function(t){h+='<div class="list-item"><span class="list-status warn"></span><span class="list-text">'+escHtml(t.title||'Sin titulo')+'</span><span class="list-meta">'+(t.due||'')+'</span></div>'})}$('panelBodyAgenda').innerHTML=h;var upCount=sites.filter(function(s){return s.status==='up'}).length;$('panelBadgeSites').textContent=upCount+' / '+sites.length;$('panelBodySites').innerHTML=sites.map(function(s){return'<div class="list-item"><span class="list-status '+(s.status==='up'?'up':'down')+'"></span><span class="list-text"><strong>'+escHtml(s.name)+'</strong></span><span class="list-meta">'+escHtml(s.url)+'</span></div>'}).join('')||'<div class="empty-state">Sin sitios</div>'}
function logActivity(l,m){var t=new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});activity.unshift({t:t,level:l,msg:m});if(activity.length>50)activity.pop();if(activeTab==='dashboard')renderActivity()}
function renderActivity(){$('activityLines').innerHTML=activity.slice(0,15).map(function(a){return'<div class="activity-line"><span class="ts">'+a.t+'</span><span class="'+a.level+'">['+a.level.toUpperCase()+']</span>'+escHtml(a.msg)+'</div>'}).join('')}
function render(){if(activeTab!=='dashboard')return;var h=calcHealth();renderKPI(h);renderMetrics();renderPanels();renderActivity()}

/* CHAT */
async function sendChat(){var input=$('chatInput'),msg=input.value.trim();if(!msg)return;input.value='';input.style.height='auto';chatHistory.push({role:'user',content:msg});renderChatMessages();$('chatSendBtn').disabled=true;try{var messages=chatHistory.filter(function(m){return m.role!=='system'}).slice(-20);var r=await fetch(BASE+'/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:messages})});var d=await r.json();chatHistory.push({role:'assistant',content:d.response||'Sin respuesta'});renderChatMessages()}catch(e){chatHistory.push({role:'assistant',content:'Error de conexion'});renderChatMessages()}$('chatSendBtn').disabled=false;$('chatInput').focus()}
function renderChatMessages(){$('chatMessages').innerHTML=chatHistory.map(function(m){return'<div class="chat-msg '+m.role+'">'+escHtml(m.content).replace(/\n/g,'<br>')+'</div>'}).join('');$('chatMessages').scrollTop=$('chatMessages').scrollHeight}

/* AGENDA */
async function agendaLoad(){try{var a=await Promise.all([fetch(BASE+'/api/calendar'),fetch(BASE+'/api/tasks')]);var c=await a[0].json(),t=await a[1].json();agendaEvents=c.events||[];agendaTasks=t.tasks||[];$('agendaLastSync').textContent='Actualizado '+new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});agendaRender()}catch(e){$('agendaLayout').innerHTML='<div class="empty-state">Error al cargar datos</div>'}}
function setAgendaView(v,btn){agendaView=v;document.querySelectorAll('.agenda-btn').forEach(function(b){b.classList.remove('active')});btn.classList.add('active');agendaRender()}
function getBadge(d){var now=new Date(),today=new Date(now.getFullYear(),now.getMonth(),now.getDate());var tomorrow=new Date(today);tomorrow.setDate(tomorrow.getDate()+1);var weekEnd=new Date(today);weekEnd.setDate(weekEnd.getDate()+7);if(d.toDateString()===today.toDateString())return{cls:'today',label:'Hoy'};if(d.toDateString()===tomorrow.toDateString())return{cls:'today',label:'Manana'};if(d<weekEnd)return{cls:'soon',label:d.toLocaleDateString('es-AR',{weekday:'long',day:'numeric'})};return{cls:'later',label:d.toLocaleDateString('es-AR',{month:'short',day:'numeric'})}}
function agendaRender(){if(agendaView==='upcoming')avUpcoming();else if(agendaView==='tasks')avTasks();else avCalendar()}
function avUpcoming(){var DAY_MS=86400000,now=new Date(),today=new Date(now.getFullYear(),now.getMonth(),now.getDate());var upcoming=agendaEvents.filter(function(e){var d=e.start?new Date(e.start):null;return d&&d>=today}).sort(function(a,b){return new Date(a.start)-new Date(b.start)});var week=upcoming.filter(function(e){var d=new Date(e.start);return d<new Date(today.getTime()+7*DAY_MS)});var l='<div class="agenda-col"><div class="agenda-col-header">Proximos 7 dias ('+week.length+')</div><div class="agenda-col-body">';if(week.length===0)l+='<div class="empty-state">Sin eventos esta semana</div>';else week.forEach(function(e){var d=new Date(e.start),b=getBadge(d);l+='<div class="event-card"><div class="event-date-badge '+b.cls+'">'+b.label+'</div><div class="event-title">'+escHtml(e.summary||'Sin titulo')+'</div><div class="event-time-loc">'+d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})+(e.location?' · '+escHtml(e.location):'')+'</div></div>'});l+='</div></div>';var active=agendaTasks.filter(function(t){return t.status!=='completed'});var r='<div class="agenda-col"><div class="agenda-col-header">Tareas pendientes ('+active.length+')</div><div class="agenda-col-body">';if(active.length===0)r+='<div class="empty-state">Sin tareas</div>';else active.forEach(function(t){var isOverdue=t.due&&new Date(t.due)<new Date();r+='<div class="task-card"><div class="task-title">'+escHtml(t.title)+'</div>';if(t.notes)r+='<div style="font-size:11px;color:var(--text3);margin-top:2px">'+escHtml(t.notes).substring(0,100)+'</div>';if(t.due)r+='<div class="task-due'+(isOverdue?' overdue':' normal')+'">'+(isOverdue?'Vencida: ':'Vence: ')+new Date(t.due).toLocaleDateString('es-AR')+'</div>';r+='<div class="task-actions"><button class="task-btn done-btn" onclick="agendaComplete(\''+t.id+'\')">Completar</button></div></div>'});r+='</div><div class="agenda-col-footer"><input class="agenda-input" id="newTask1" placeholder="Nueva tarea..." onkeydown="if(event.key===\'Enter\')agendaCreate()"><button class="agenda-btn active" onclick="agendaCreate()" style="white-space:nowrap">+ Agregar</button></div></div>';$('agendaLayout').innerHTML=l+r}
function avTasks(){var active=agendaTasks.filter(function(t){return t.status!=='completed'}),done=agendaTasks.filter(function(t){return t.status==='completed'});var l='<div class="agenda-col"><div class="agenda-col-header">Activas ('+active.length+')</div><div class="agenda-col-body">';if(active.length===0)l+='<div class="empty-state">Sin tareas activas</div>';else active.forEach(function(t){var isOverdue=t.due&&new Date(t.due)<new Date();l+='<div class="task-card"><div class="task-title">'+escHtml(t.title)+'</div>';if(t.notes)l+='<div style="font-size:11px;color:var(--text3);margin-top:2px">'+escHtml(t.notes).substring(0,120)+'</div>';if(t.due)l+='<div class="task-due'+(isOverdue?' overdue':' normal')+'">'+(isOverdue?'Vencida: ':'Vence: ')+new Date(t.due).toLocaleDateString('es-AR')+'</div>';l+='<div class="task-actions"><button class="task-btn done-btn" onclick="agendaComplete(\''+t.id+'\')">Completar</button></div></div>'});l+='</div><div class="agenda-col-footer"><input class="agenda-input" id="newTask2" placeholder="Nueva tarea..." onkeydown="if(event.key===\'Enter\')agendaCreate()"><button class="agenda-btn active" onclick="agendaCreate()" style="white-space:nowrap">+ Agregar</button></div></div>';var r='<div class="agenda-col"><div class="agenda-col-header">Completadas ('+done.length+')</div><div class="agenda-col-body">';if(done.length===0)r+='<div class="empty-state">Sin tareas completadas</div>';else done.slice(0,30).forEach(function(t){r+='<div class="task-card done"><div class="task-title">'+escHtml(t.title)+'</div></div>'});r+='</div></div>';$('agendaLayout').innerHTML=l+r}
function avCalendar(){var today=new Date();if(!calYear){calYear=today.getFullYear();calMonth=today.getMonth()}var fd=new Date(calYear,calMonth,1).getDay(),dim=new Date(calYear,calMonth+1,0).getDate(),pmd=new Date(calYear,calMonth,0).getDate();var em={};agendaEvents.forEach(function(e){var d=e.start?new Date(e.start):null;if(d){var k=d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();em[k]=(em[k]||0)+1}});var cal='<div class="calendar-mini"><div class="cm-header"><span class="cm-title">'+new Date(calYear,calMonth).toLocaleDateString('es-AR',{month:'long',year:'numeric'})+'</span><div class="cm-nav"><button onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--};avCalendar()">&#x2039;</button><button onclick="var t=new Date();calYear=t.getFullYear();calMonth=t.getMonth();avCalendar()">Hoy</button><button onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++};avCalendar()">&#x203a;</button></div></div><div class="cm-grid">';cal+=['Do','Lu','Ma','Mi','Ju','Vi','Sa'].map(function(h){return'<div class="cm-day-hdr">'+h+'</div>'}).join('');for(var i=fd-1;i>=0;i--){cal+='<div class="cm-day other">'+(pmd-i)+'</div>'}var sel=agendaCalendarDate||today;for(var d=1;d<=dim;d++){var dob=new Date(calYear,calMonth,d);var isToday=today.toDateString()===dob.toDateString(),isSel=sel.toDateString()===dob.toDateString(),hasEv=em[calYear+'-'+calMonth+'-'+d];cal+='<div class="cm-day'+(isToday?' today':'')+(isSel?' selected':'')+(hasEv?' has-event':'')+'" onclick="agendaCalendarDate=new Date('+calYear+','+calMonth+','+d+');avCalendar()">'+d+'</div>'}cal+='</div></div>';var se=agendaEvents.filter(function(e){var d=e.start?new Date(e.start):null;return d&&d.toDateString()===sel.toDateString()}).sort(function(a,b){return new Date(a.start)-new Date(b.start)});var ev='<div class="agenda-col"><div class="agenda-col-header">'+sel.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'})+' ('+se.length+')</div><div class="agenda-col-body">';if(se.length===0)ev+='<div class="empty-state">Sin eventos este dia</div>';else se.forEach(function(e){var d=new Date(e.start);ev+='<div class="event-card"><div class="event-title">'+escHtml(e.summary||'Sin titulo')+'</div><div class="event-time-loc">'+d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})+(e.location?' · '+escHtml(e.location):'')+'</div></div>'});ev+='</div></div>';$('agendaLayout').innerHTML='<div class="agenda-col">'+cal+'</div>'+ev}
async function agendaComplete(id){try{await fetch(BASE+'/api/tasks/complete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:id})});toast('Tarea completada');await agendaLoad()}catch(e){toast('Error')}}
async function agendaCreate(){var inp=$('newTask1')||$('newTask2');var title=(inp?inp.value:'').trim();if(!title)return;try{await fetch(BASE+'/api/tasks/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:title})});if(inp)inp.value='';toast('Tarea creada');await agendaLoad()}catch(e){toast('Error')}}

/* NOTAS — bulletproof */
async function nbLoad(){
  try{
    var r=await fetch(BASE+'/api/notas/tree');
    var d=await r.json();
    nbTree=d.tree||[];
    nbFilter(($('nbSearch')||{}).value||'');
  }catch(e){$('nbList').innerHTML='<div class="empty-state">Error al cargar notas</div>'}
}
function nbFilter(q){
  q=(q||'').toLowerCase();
  var el=$('nbList');
  el.innerHTML='';
  if(!nbTree.length){el.innerHTML='<div class="empty-state">Sin notas</div>';return}
  nbBuildList(nbTree,0,q,el);
}
function nbBuildList(items,depth,q,parent){
  items.forEach(function(item){
    var match=!q||item.name.toLowerCase().indexOf(q)>=0;
    var childMatch=item.children&&item.children.some(function(c){return c.name.toLowerCase().indexOf(q)>=0});
    if(!match&&!childMatch&&q)return;
    var div=document.createElement('div');
    div.className='nb-item'+(nbPath===item.path?' active':'');
    div.style.paddingLeft=(12+depth*16)+'px';
    div.innerHTML='<span class="nb-icon">'+(item.type==='folder'?'&#x1f4c1;':'&#x1f4c4;')+'</span><span class="nb-name">'+escHtml(item.name)+'</span>';
    if(item.type==='file'&&item.modified){var d=new Date(item.modified);div.innerHTML+='<span class="nb-date">'+d.toLocaleDateString('es-AR',{month:'short',day:'numeric'})+'</span>'}
    div.addEventListener('click',function(){
      if(item.type==='folder'){
        var children=div.parentElement.querySelectorAll('[data-parent="'+item.path+'"]');
        children.forEach(function(c){c.style.display=c.style.display==='none'?'block':'none'});
      }else{nbOpen(item.path)}
    });
    parent.appendChild(div);
    if(item.children&&item.children.length>0){
      var wrap=document.createElement('div');
      wrap.setAttribute('data-parent',item.path);
      parent.appendChild(wrap);
      nbBuildList(item.children,depth+1,q,wrap);
    }
  });
}
async function nbOpen(path){
  if(nbDirty&&!confirm('Tenes cambios sin guardar. Descartar?'))return;
  nbPath=path;nbDirty=false;
  try{
    var r=await fetch(BASE+'/api/notas/read?path='+encodeURIComponent(path));
    if(!r.ok){toast('Error al leer la nota ('+r.status+')');return}
    var d=await r.json();
    $('nbWelcome').style.display='none';
    $('nbEditor').classList.add('show');
    $('nbTitle').value=path.replace(/\.md$/,'').split('/').pop();
    $('nbTextarea').value=d.content||'';
    $('nbMeta').textContent=path+' · '+(d.content||'').split('\n').length+' lineas · '+(d.content||'').length+' chars';
    nbLoad();
  }catch(e){toast('Error al cargar: '+e.message)}
}
function nbNew(){
  if(nbDirty&&!confirm('Tenes cambios sin guardar. Descartar?'))return;
  var name=prompt('Nombre de la nota (sin .md):');if(!name)return;
  nbPath='ideas/'+name+'.md';nbDirty=true;
  $('nbWelcome').style.display='none';$('nbEditor').classList.add('show');
  $('nbTitle').value=name;
  $('nbTextarea').value='---\ntitle: '+name+'\ndate: '+new Date().toISOString().split('T')[0]+'\ntags: []\n---\n\n# '+name+'\n';
  $('nbMeta').textContent=nbPath+' · nueva';
}
async function nbSave(){
  if(!nbPath)return;
  try{await fetch(BASE+'/api/notas/write',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:nbPath,content:$('nbTextarea').value})});nbDirty=false;toast('Guardado');nbLoad()}catch(e){toast('Error al guardar')}
}
async function nbDelete(){
  if(!nbPath||!confirm('Eliminar '+nbPath+'?'))return;
  try{await fetch(BASE+'/api/notas/delete',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:nbPath})});nbPath=null;nbDirty=false;$('nbWelcome').style.display='flex';$('nbEditor').classList.remove('show');$('nbTextarea').value='';nbLoad();toast('Eliminado')}catch(e){toast('Error al eliminar')}
}

/* UTILS */
function escHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function toast(msg){var el=document.createElement('div');el.className='toast';el.textContent=msg;$('toasts').appendChild(el);setTimeout(function(){el.remove()},3000)}
document.addEventListener('keydown',function(e){if((e.metaKey||e.ctrlKey)&&e.key==='s'){e.preventDefault();if(activeTab==='notas')nbSave()}});

/* INIT */
logActivity('ok','Akira OS iniciado');fetchAll();setInterval(fetchAll,30000);
</script>
